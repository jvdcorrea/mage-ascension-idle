function renderCraft() {
  const tierUnlocked = craftTierUnlocked();
  let html = `
    <div class="panel-header">
      <h2>Craft — Quintessence Talismans</h2>
      <span class="xp-label">${fmt(S.res.quintessence)} Quintessence</span>
    </div>
    <div class="unlock-desc" style="margin-bottom:14px">
      Spend Quintessence to forge talismans that grant temporary boons.
      Recipes unlock in groups as you advance the <strong>Prime</strong> sphere.
    </div>
  `;

  // ── Active boons (so the player always sees what is in effect) ──
  html += `<div class="upgrade-group">Active Boons</div>`;
  if (S.craftActive.length === 0) {
    html += `<div class="unlock-desc" style="margin-bottom:8px">No talismans are currently active.</div>`;
  } else {
    for (const a of S.craftActive) {
      const def = CRAFT_BY_ID[a.id];
      if (!def) continue;
      const remain = def.mode === 'charges'
        ? `${Math.ceil(a.remaining)} / ${def.amount} uses`
        : `${fmtTime(Math.max(0, a.remaining))} left`;
      html += `
        <div class="unlock-item done">
          <div>
            <div class="unlock-name">${def.name}</div>
            <div class="unlock-desc">${def.desc}</div>
          </div>
          <div class="unlock-state"${def.mode === 'time' ? ` id="craft-remain-${a.id}"` : ''}>${remain}</div>
        </div>`;
    }
  }

  // ── Recipes, grouped by tier ──
  for (let t = 1; t <= CRAFT_MAX_TIER; t++) {
    const items = CRAFT_ITEMS.filter(it => it.tier === t);
    if (!items.length) continue;
    const tierLocked = tierUnlocked < t;
    html += `<div class="upgrade-group">Tier ${t}${tierLocked ? ` — Requires Prime ${t}` : ''}</div>`;

    for (const def of items) {
      const active = S.craftActive.some(a => a.id === def.id);
      // An already-active talisman can't be crafted again until it expires,
      // so its button is disabled (and labelled) to make that clear.
      const canBuy = !tierLocked && !active && S.res.quintessence >= def.cost;
      const label  = active ? 'Active' : `Craft — ${fmt(def.cost)} Quint`;

      const state = tierLocked
        ? `Requires Prime ${t}`
        : `<button class="buy-btn" onclick="craftItem('${def.id}')"${canBuy ? '' : ' disabled'}>
             ${label}</button>`;

      html += `
        <div class="unlock-item${tierLocked ? ' dimmed' : ''}${active ? ' done' : ''}">
          <div>
            <div class="unlock-name">${def.name}</div>
            <div class="unlock-desc">${def.desc}</div>
          </div>
          <div class="unlock-state">${state}</div>
        </div>`;
    }
  }

  document.getElementById('activity-panel').innerHTML = html;
}

// Update only the live countdowns of active time-based boons, without
// rebuilding the panel — otherwise the per-frame re-render would replace
// the recipe buttons mid-click and make them unclickable.
function refreshCraftTimers() {
  for (const a of S.craftActive) {
    const def = CRAFT_BY_ID[a.id];
    if (!def || def.mode !== 'time') continue;
    const node = document.getElementById('craft-remain-' + a.id);
    if (node) node.textContent = `${fmtTime(Math.max(0, a.remaining))} left`;
  }
}

// Desired Renown investment for the next recruit (UI-only, not saved).
let recruitAmount = 50;
function canRecruit(amt) {
  return !S.teach.recruiting
    && regularApprentices() < maxApprentices()
    && amt >= 1 && S.res.renown >= amt;
}
function recruitPreviewText() {
  if (recruitAmount < 1) return 'Enter a Renown amount to invest.';
  const p = recruitPreview(recruitAmount);
  return `≈ level ${p.level} apprentice · ${fmtTime(p.dur)} to train`;
}
function setRecruitAmount(v) {
  recruitAmount = Math.max(0, Math.floor(Number(v) || 0));
  const prev = document.getElementById('recruit-preview');
  if (prev) prev.textContent = recruitPreviewText();
  const btn = document.getElementById('recruit-btn');
  if (btn) btn.disabled = !canRecruit(recruitAmount);
}
function setRecruitPreset(v) { recruitAmount = Math.floor(v); renderActivities(); }
function recruitFromInput() { startRecruit(recruitAmount); }

function renderTeach() {
  const used = regularApprentices();
  const total = S.teach.apprentices.length;
  const max  = maxApprentices();
  const slotFree = used < max && !S.teach.recruiting;

  const cumXp  = S.teach.xp - xpForTeachLevel(S.teach.lv);
  const needed = xpToNextTeach(S.teach.lv);
  const xpPct  = Math.min(100, (cumXp / needed) * 100);

  let html = `
    <div class="panel-header">
      <h2>Teach — Level ${S.teach.lv}</h2>
      <span class="xp-label">${Math.floor(cumXp)} / ${needed} XP · ${fmt(S.res.renown)} Renown</span>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar" style="width:${xpPct}%"></div></div>
  `;

  // ── Didactics: player activities that train Teach directly ──
  html += `<div class="upgrade-group">Didactics — train your Teach skill</div>`;
  TEACH_ACTIVITIES.forEach((act, i) => {
    const locked  = S.teach.lv < act.unlockLv;
    const running = S.running && S.running.teach && S.running.idx === i;
    const dur     = teachActDur(act);
    html += `
      <div class="activity-item${locked ? ' locked' : ''}${running ? ' running' : ''}"
           onclick="startTeachActivity(${i})">
        <div>
          <div class="activity-name">${act.name}</div>
          ${locked ? `<div class="activity-unlock-note">Requires Teach level ${act.unlockLv}</div>` : ''}
        </div>
        <div class="activity-meta">
          <div class="activity-reward">+${fmt(act.xp * sphereXpMult())} Teach XP</div>
          <div>${fmtTime(dur)}</div>
        </div>
      </div>`;
  });

  // ── Apprentices intro ──
  html += `<div class="upgrade-group">Apprentices</div>`;
  html += `
    <div class="unlock-desc" style="margin-bottom:10px">
      Spend Renown to recruit apprentices. They gather resources for you passively,
      in parallel with your own activity, and each completion also teaches you a little.
      More Renown invested means a faster, higher-level recruit.
      Slots: <strong>${used} / ${max}</strong> (grows with your Teach level).
    </div>
  `;

  // ── Recruiting panel ──
  html += `<div class="upgrade-group">Recruit</div>`;
  if (S.teach.recruiting) {
    const r   = S.teach.recruiting;
    const pct = clamp((r.progress / r.dur) * 100, 0, 100);
    const rem = Math.max(0, r.dur - r.progress);
    html += `
      <div class="unlock-item">
        <div style="flex:1">
          <div class="unlock-name">Training a level ${r.level} apprentice…</div>
          <div class="prog-wrap" style="margin-top:6px"><div class="prog-fill" id="recruit-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="unlock-state" id="recruit-timer">${fmtTime(rem)}</div>
      </div>`;
  } else if (!slotFree) {
    html += `<div class="unlock-desc" style="margin-bottom:8px">All apprentice slots are full. Raise your Teach level for more.</div>`;
  } else {
    const presets = [50, 250, 1000, 2500, 5000];
    html += `
      <div class="unlock-item">
        <div style="flex:1">
          <div class="unlock-name">
            Invest
            <input type="number" min="1" step="10" value="${recruitAmount}"
                   oninput="setRecruitAmount(this.value)"
                   style="width:90px;margin:0 6px"> Renown
          </div>
          <div class="unlock-desc" id="recruit-preview">${recruitPreviewText()}</div>
          <div style="margin-top:6px">
            ${presets.map(p => `<button class="buy-btn" onclick="setRecruitPreset(${p})" style="margin-right:6px">${p}</button>`).join('')}
            <button class="buy-btn" onclick="setRecruitPreset(${Math.floor(S.res.renown)})" style="margin-right:6px">Max</button>
          </div>
        </div>
        <div class="unlock-state">
          <button class="buy-btn" id="recruit-btn" onclick="recruitFromInput()"${canRecruit(recruitAmount) ? '' : ' disabled'}>Recruit</button>
        </div>
      </div>`;
  }

  // ── Apprentice roster ──
  html += `<div class="upgrade-group">Active roster</div>`;
  if (total === 0) {
    html += `<div class="unlock-desc">No apprentices yet. Recruit one above.</div>`;
  } else {
    for (const a of S.teach.apprentices) {
      // Special apprentices have a fixed sphere-granted level and never train.
      const atCap  = a.special || a.level >= APPR_MAX_LEVEL;
      const cumXp  = a.xp - xpForApprenticeLevel(a.level);
      const needed = xpForApprenticeLevel(a.level + 1) - xpForApprenticeLevel(a.level);
      const xpPct  = atCap ? 100 : clamp((cumXp / needed) * 100, 0, 100);
      const xpText = a.special ? 'bound ally' : a.level >= APPR_MAX_LEVEL ? 'max level' : `${Math.floor(xpPct)}% to next`;
      // Activity-cycle progress — the live "is it working?" indicator.
      const cyclePct = (a.assign && a.dur > 0) ? clamp((a.progress / a.dur) * 100, 0, 100) : 0;

      const options = `<option value="">— idle —</option>` +
        ASSIGNABLE.filter(isSkillUnlocked).map(id =>
          `<option value="${id}"${a.assign === id ? ' selected' : ''}>${SKILLS[id].name}</option>`).join('');

      let status;
      if (a.setback.on) {
        status = `<span class="activity-risk" id="appr-status-${a.id}">⚠ recovering · ${fmtTime(a.setback.remaining)}</span>`;
      } else if (a.stalled && a.assign) {
        const sk   = SKILLS[a.assign];
        const cost = apprenticeReward(a.level) * apprenticeCostRatio(sk);
        status = `<span class="activity-risk">⏸ paused — needs ${fmt(cost)} ${sk.costRes} per cycle</span>`;
      } else if (a.assign) {
        const sk   = SKILLS[a.assign];
        const rate = apprenticeReward(a.level) / apprenticeDur(a.level);
        status = `+${fmt(rate)} ${sk.resource}/s`;
      } else {
        status = 'idle';
      }

      const title = a.special
        ? `✦ ${a.name} — Lv ${a.level} <span class="unlock-desc">(${xpText})</span>`
        : `Apprentice — Lv ${a.level} <span class="unlock-desc">(${xpText})</span>`;
      html += `
        <div class="unlock-item${a.setback.on || a.stalled ? ' dimmed' : ''}">
          <div style="flex:1">
            <div class="unlock-name">${title}</div>
            <div class="prog-wrap" style="margin:6px 0"><div class="prog-fill" id="appr-prog-${a.id}" style="width:${cyclePct}%"></div></div>
            <div class="unlock-desc">
              Assignment:
              <select onchange="assignApprentice(${a.id}, this.value)" style="margin-left:4px">${options}</select>
              · ${status}
            </div>
          </div>
          <div class="unlock-state">
            ${a.special ? '<span class="unlock-desc">bound</span>' : `<button class="buy-btn" onclick="dismissApprentice(${a.id})">Dismiss</button>`}
          </div>
        </div>`;
    }
  }

  document.getElementById('activity-panel').innerHTML = html;
}

function renderActivities() {
  if (S.tab === 'unlocks')  { renderUnlocks();  return; }
  if (S.tab === 'upgrades') { renderUpgrades(); return; }
  if (S.tab === 'spheres')  { renderSpheres();  return; }
  if (S.tab === 'craft')    { renderCraft();    return; }
  if (S.tab === 'teach')    { renderTeach();    return; }

  const id = S.tab;
  const sk = SKILLS[id];
  const ss = S.skills[id];

  const cumXp  = ss.xp - xpForLevel(ss.lv);
  const needed = xpToNext(ss.lv);
  const pct    = Math.min(100, (cumXp / needed) * 100);

  let html = `
    <div class="panel-header">
      <h2>${sk.name} — Level ${ss.lv}</h2>
      <span class="xp-label">${Math.floor(cumXp)} / ${needed} XP</span>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar" style="width:${pct}%"></div></div>
  `;

  sk.activities.forEach((act, i) => {
    const unlockLv = sk.unlocks[i];
    const lvLocked = ss.lv < unlockLv;
    const sphLocked = !actSphereMet(act);
    const locked   = lvLocked || sphLocked;
    const running  = S.running && S.running.skillId === id && S.running.idx === i;
    const dur      = effDur(act.dur, ss.lv, id);
    // Show whichever requirement isn't met yet (skill level takes priority).
    const lockNote = lvLocked ? `Requires level ${unlockLv}` : sphLocked ? `Requires ${sphereReqText(act)}` : '';
    const costTxt  = locked ? '' : actCostText(id, act);
    const riskPct  = Math.round(setbackChance(sk, act, ss.lv) * craftFactor(id, 'setback') * sphereSetbackMult(id));

    html += `
      <div class="activity-item${locked ? ' locked' : ''}${running ? ' running' : ''}"
           onclick="startActivity('${id}', ${i})">
        <div>
          <div class="activity-name">${act.name}</div>
          ${locked ? `<div class="activity-unlock-note">${lockNote}</div>` : ''}
        </div>
        <div class="activity-meta">
          ${costTxt ? `<div class="activity-cost">${costTxt}</div>` : ''}
          <div class="activity-reward">${actRewardText(id, act)}</div>
          <div>${fmtTime(dur)}</div>
          ${sk.risky && !locked && riskPct > 0 ? `<div class="activity-risk">⚠ ${riskPct}% · ${fmtTime(setbackDur(act))} recovery</div>` : ''}
        </div>
      </div>`;
  });

  document.getElementById('activity-panel').innerHTML = html;
}

function renderBottomBar() {
  const bar = document.getElementById('bottom-bar');

  if (S.setback.on) {
    const pct = (1 - S.setback.remaining / S.setback.total) * 100;
    bar.className = 'bottom-bar setback-mode';
    bar.innerHTML = `
      <div class="bar-sublabel danger">Recovering — the mage suffers the consequences</div>
      <div class="bar-name">Setback<span class="bar-timer">${fmtTime(S.setback.remaining)} remaining</span></div>
      <div class="prog-wrap"><div class="prog-fill setback-fill" style="width:${pct}%"></div></div>`;
    return;
  }

  if (S.teach.recruiting) {
    const r   = S.teach.recruiting;
    const pct = Math.min(100, (r.progress / r.dur) * 100);
    const rem = Math.max(0, r.dur - r.progress);
    bar.className = 'bottom-bar';
    bar.innerHTML = `
      <div class="bar-sublabel">Training an apprentice — you cannot perform activities</div>
      <div class="bar-name">Recruiting a level ${r.level} apprentice<span class="bar-timer">${fmtTime(rem)}</span></div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>`;
    return;
  }

  if (!S.running) {
    bar.className = 'bottom-bar';
    bar.innerHTML = `<span class="idle-msg">${haltMsg || 'Select an activity to begin.'}</span>`;
    return;
  }

  const { idx, progress, dur } = S.running;
  const act  = S.running.teach ? TEACH_ACTIVITIES[idx] : SKILLS[S.running.skillId].activities[idx];
  const pct  = Math.min(100, (progress / dur) * 100);
  const rem  = Math.max(0, dur - progress);

  bar.className = 'bottom-bar';
  bar.innerHTML = `
    <div class="bar-sublabel">Currently performing</div>
    <div class="bar-name">${act.name}<span class="bar-timer">${fmtTime(rem)}</span></div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>`;
}

// ─────────────────────────────────────────────
// SAVE / LOAD
// ─────────────────────────────────────────────
const SAVE_KEY = 'mage-idle-save';
const SAVE_VERSION = 1;
const AUTOSAVE_INTERVAL = 15000;

function serializeSave() {
  return JSON.stringify({
    v: SAVE_VERSION,
    savedAt: Date.now(),
    res: S.res,
    total: S.total,
    skills: S.skills,
    unlocked: S.unlocked,
    upgrades: S.upgrades,
    spheres: S.spheres,
    craftActive: S.craftActive,
    teach: S.teach,
    tab: S.tab,
    running: S.running,
    setback: S.setback,
  });
}

// Set while a reset is in flight so neither the autosave interval nor the
// beforeunload handler can re-persist state after we've wiped it (otherwise
// the reload would just reload the old save).
let resetting = false;

function saveGame(manual) {
  if (resetting) return;
  try {
    localStorage.setItem(SAVE_KEY, serializeSave());
    flashSaveStatus(manual ? 'Saved' : 'Autosaved');
  } catch (e) {
    flashSaveStatus('Save failed');
  }
}

// Merge a parsed save into S, validating every field so old or
// hand-edited saves (and future schema changes) can't break the game.
function applySave(d) {
  if (!d || typeof d !== 'object') return;

  if (d.res) {
    for (const k of Object.keys(S.res)) {
      if (typeof d.res[k] === 'number' && isFinite(d.res[k])) S.res[k] = d.res[k];
    }
  }
  for (const k of Object.keys(S.total)) {
    if (d.total && typeof d.total[k] === 'number' && isFinite(d.total[k])) {
      S.total[k] = d.total[k];
    } else {
      // Older saves had no lifetime totals; the current balance is the
      // best lower bound for what was acquired.
      S.total[k] = S.res[k];
    }
  }
  if (d.unlocked) {
    for (const k of Object.keys(S.unlocked)) S.unlocked[k] = !!d.unlocked[k];
  }
  S.upgrades = {};
  if (d.upgrades) {
    for (const u of UPGRADES) if (d.upgrades[u.id]) S.upgrades[u.id] = true;
  }
  S.spheres = Object.fromEntries(SPHERES.map(sp => [sp.id, 0]));
  if (d.spheres) {
    for (const sp of SPHERES) {
      const v = d.spheres[sp.id];
      if (typeof v === 'number' && isFinite(v)) {
        S.spheres[sp.id] = clamp(Math.floor(v), 0, SPHERE_MAX);
      }
    }
  }
  S.craftActive = [];
  if (Array.isArray(d.craftActive)) {
    for (const a of d.craftActive) {
      const def = a && CRAFT_BY_ID[a.id];
      if (def && typeof a.remaining === 'number' && isFinite(a.remaining) && a.remaining > 0) {
        S.craftActive.push({ id: a.id, remaining: clamp(a.remaining, 0, def.amount) });
      }
    }
  }
  // Teach: level/xp, apprentices and any recruit in progress.
  S.teach = { lv: 0, xp: 0, nextId: 1, apprentices: [], recruiting: null };
  if (d.teach && typeof d.teach === 'object') {
    const t = d.teach;
    if (typeof t.lv === 'number' && isFinite(t.lv)) S.teach.lv = Math.max(0, Math.floor(t.lv));
    if (typeof t.xp === 'number' && isFinite(t.xp)) S.teach.xp = Math.max(0, t.xp);
    if (Array.isArray(t.apprentices)) {
      for (const a of t.apprentices) {
        if (!a || typeof a !== 'object') continue;
        // Special (sphere-granted) apprentices keep their fixed high level and
        // identity; regular ones clamp to the normal cap.
        const special = a.special === true && typeof a.source === 'string';
        const level = special
          ? Math.max(1, Math.floor(a.level))
          : clamp(Math.floor(a.level), 1, APPR_MAX_LEVEL);
        const assign = (a.assign && ASSIGNABLE.includes(a.assign)) ? a.assign : null;
        const sb = a.setback || {};
        const sbTotal = (typeof sb.total === 'number' && isFinite(sb.total) && sb.total > 0) ? sb.total : 0;
        const sbRem   = (typeof sb.remaining === 'number' && isFinite(sb.remaining)) ? clamp(sb.remaining, 0, sbTotal) : 0;
        const loaded = {
          id: S.teach.nextId++,
          level,
          xp: (typeof a.xp === 'number' && isFinite(a.xp)) ? Math.max(special ? 0 : xpForApprenticeLevel(level), a.xp) : (special ? 0 : xpForApprenticeLevel(level)),
          assign,
          progress: (typeof a.progress === 'number' && isFinite(a.progress)) ? Math.max(0, a.progress) : 0,
          dur: 0,
          setback: { on: sbRem > 0, remaining: sbRem, total: sbTotal },
        };
        if (special) { loaded.special = true; loaded.source = a.source; loaded.name = (typeof a.name === 'string' && a.name.trim()) ? a.name : 'Bound Ally'; loaded.stalled = false; }
        S.teach.apprentices.push(loaded);
      }
    }
    if (t.recruiting && typeof t.recruiting === 'object') {
      const r = t.recruiting;
      const lvl = clamp(Math.floor(r.level), 1, APPR_MAX_LEVEL);
      const dur = (typeof r.dur === 'number' && isFinite(r.dur) && r.dur > 0) ? r.dur : RECRUIT_BASE;
      if (isFinite(lvl)) {
        S.teach.recruiting = {
          renown: (typeof r.renown === 'number' && isFinite(r.renown)) ? Math.max(0, r.renown) : 0,
          level: lvl,
          dur,
          progress: (typeof r.progress === 'number' && isFinite(r.progress)) ? clamp(r.progress, 0, dur) : 0,
        };
      }
    }
  }
  if (d.skills) {
    for (const id of SKILL_IDS) {
      const sv = d.skills[id];
      if (!sv) continue;
      if (typeof sv.lv === 'number' && isFinite(sv.lv)) S.skills[id].lv = Math.max(0, Math.floor(sv.lv));
      if (typeof sv.xp === 'number' && isFinite(sv.xp)) S.skills[id].xp = Math.max(0, sv.xp);
    }
  }
  if (d.tab === 'unlocks' || d.tab === 'upgrades' ||
      (d.tab === 'spheres' && S.unlocked.spheres) ||
      (d.tab === 'craft' && S.unlocked.craft) ||
      (d.tab === 'teach' && S.unlocked.teach) ||
      (SKILL_IDS.includes(d.tab) && isSkillUnlocked(d.tab))) S.tab = d.tab;

  S.running = null;
  if (d.running && d.running.teach && TEACH_ACTIVITIES[d.running.idx]) {
    const idx = d.running.idx;
    const dur = teachActDur(TEACH_ACTIVITIES[idx]);
    S.running = {
      teach: true, idx, dur,
      progress: clamp(typeof d.running.progress === 'number' ? d.running.progress : 0, 0, dur),
    };
  } else if (d.running && SKILLS[d.running.skillId] &&
      SKILLS[d.running.skillId].activities[d.running.idx]) {
    const { skillId, idx } = d.running;
    const dur = effDur(SKILLS[skillId].activities[idx].dur, S.skills[skillId].lv, skillId);
    S.running = {
      skillId, idx, dur,
      progress: clamp(typeof d.running.progress === 'number' ? d.running.progress : 0, 0, dur),
    };
  }

  S.setback = { on: false, remaining: 0, total: 0 };
  if (d.setback && d.setback.on &&
      typeof d.setback.remaining === 'number' && d.setback.remaining > 0) {
    const total = typeof d.setback.total === 'number' && d.setback.total > 0
      ? d.setback.total : d.setback.remaining;
    S.setback = { on: true, remaining: Math.min(d.setback.remaining, total), total };
  }
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    applySave(JSON.parse(raw));
    grantSphereApprentices(true); // migrate saves that met a threshold pre-feature
    return true;
  } catch (e) {
    console.warn('Could not load save:', e);
    return false;
  }
}

function exportSave() {
  prompt('Copy this save code (Ctrl+C):', btoa(serializeSave()));
}

function importSave() {
  const code = prompt('Paste your save code:');
  if (!code) return;
  try {
    applySave(JSON.parse(atob(code.trim())));
    saveGame();
    renderAll();
    flashSaveStatus('Imported');
  } catch (e) {
    alert('That save code is invalid.');
  }
}

function resetSave() {
  if (!confirm('Erase all progress and start over? This cannot be undone.')) return;
  resetting = true;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

let saveStatusTimer = null;
function flashSaveStatus(msg) {
  for (const id of ['save-status', 'save-status-mobile']) {
    const el = document.getElementById(id);
    if (!el) continue;
    el.textContent = msg;
    el.classList.add('show');
  }
  clearTimeout(saveStatusTimer);
  saveStatusTimer = setTimeout(() => {
    for (const id of ['save-status', 'save-status-mobile']) {
      document.getElementById(id)?.classList.remove('show');
    }
  }, 2000);
}

setInterval(() => saveGame(false), AUTOSAVE_INTERVAL);
window.addEventListener('beforeunload', () => {
  if (resetting) return;
  try { localStorage.setItem(SAVE_KEY, serializeSave()); } catch (e) {}
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function renderAll() {
  renderResources();
  renderSidebar();
  renderActivities();
  renderBottomBar();
}

// ─────────────────────────────────────────────
// DEV CHEAT MENU (testing aid)
// ─────────────────────────────────────────────
// A floating, collapsible panel to grant resources/levels/sphere points so
// the sphere effects can be tried without a full playthrough. Everything is
// guarded: under the headless test stubs (no document.createElement) the
// menu simply never builds, so it can't break the logic tests.
function cheatRefresh(msg) {
  grantSphereApprentices(true); // cheating Life/Spirit grants the special apprentices too
  checkUnlocks();
  renderAll();
  updateCheatLabels();
  if (msg) flashSaveStatus(msg);
}
function cheatResources(n) {
  for (const r of Object.keys(S.res)) { S.res[r] += n; S.total[r] += n; }
  cheatRefresh('Cheat: +' + fmt(n) + ' to every resource');
}
function cheatSkillLevels(lv) {
  for (const id of SKILL_IDS) { S.skills[id].lv = lv; S.skills[id].xp = xpForLevel(lv); }
  cheatRefresh('Cheat: all skills → Lv ' + lv);
}
function cheatTeachLevel(lv) {
  S.teach.lv = lv; S.teach.xp = xpForTeachLevel(lv);
  cheatRefresh('Cheat: Teach → Lv ' + lv);
}
function cheatUnlockAll() {
  for (const k of Object.keys(S.unlocked)) S.unlocked[k] = true;
  cheatRefresh('Cheat: everything unlocked');
}
function cheatMaxSpheres() {
  // Raise skill levels first so Total Level covers the spheres' EXP cost
  // (9 × 55 = 495) and "EXP available" doesn't read negative.
  for (const id of SKILL_IDS) if (S.skills[id].lv < 60) { S.skills[id].lv = 60; S.skills[id].xp = xpForLevel(60); }
  for (const k of Object.keys(S.spheres)) S.spheres[k] = SPHERE_MAX;
  S.unlocked.spheres = true; S.unlocked.craft = true;
  cheatRefresh('Cheat: all Spheres maxed (5)');
}
// Cycle one sphere 0→1→…→5→0, for testing a single sphere at a chosen level.
function cheatBumpSphere(id) {
  S.spheres[id] = (S.spheres[id] + 1) % (SPHERE_MAX + 1);
  S.unlocked.spheres = true;
  if (S.spheres.prime >= 1) S.unlocked.craft = true;
  cheatRefresh(SPHERES.find(sp => sp.id === id).name + ' → ' + S.spheres[id]);
}
function cheatResetSave() {
  if (typeof confirm === 'function' && !confirm('Wipe the save and reload?')) return;
  resetting = true;
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  if (typeof location !== 'undefined') location.reload();
}

const CHEAT_BTN = 'background:var(--panel2,#241a3d);color:var(--text,#eee);border:1px solid var(--border);border-radius:4px;padding:5px 7px;margin:2px;cursor:pointer;font-family:inherit;font-size:.72rem;';
function updateCheatLabels() {
  if (typeof document === 'undefined' || typeof document.getElementById !== 'function') return;
  for (const sp of SPHERES) {
    const b = document.getElementById('cheat-sph-' + sp.id);
    if (b && b.textContent !== undefined) b.textContent = sp.name.slice(0, 4) + ' ' + S.spheres[sp.id];
  }
}
function buildCheatMenu() {
  if (typeof document === 'undefined' || !document.body ||
      typeof document.createElement !== 'function' || typeof document.body.appendChild !== 'function') return;
  let panel = document.getElementById('cheat-menu');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'cheat-menu';
    panel.style.cssText = 'position:fixed;right:10px;bottom:10px;z-index:9999;font-family:inherit;';
    document.body.appendChild(panel);
  }
  const sphereBtns = SPHERES.map(sp =>
    `<button id="cheat-sph-${sp.id}" style="${CHEAT_BTN}min-width:54px" onclick="cheatBumpSphere('${sp.id}')">${sp.name.slice(0,4)} ${S.spheres[sp.id]}</button>`
  ).join('');
  panel.innerHTML = `
    <details style="background:var(--panel);border:1px solid var(--border);border-radius:6px;max-width:340px;">
      <summary style="cursor:pointer;padding:6px 10px;color:var(--accent);font-weight:bold;user-select:none;">🛠 Cheats</summary>
      <div style="padding:6px;display:flex;flex-direction:column;gap:4px;">
        <div>
          <button style="${CHEAT_BTN}" onclick="cheatResources(1e4)">💰 +10k all res</button>
          <button style="${CHEAT_BTN}" onclick="cheatResources(1e6)">💰 +1M all res</button>
          <button style="${CHEAT_BTN}" onclick="cheatResources(1e9)">💰 +1B all res</button>
        </div>
        <div>
          <button style="${CHEAT_BTN}" onclick="cheatSkillLevels(50)">⬆ Skills 50</button>
          <button style="${CHEAT_BTN}" onclick="cheatSkillLevels(100)">⬆ Skills 100</button>
          <button style="${CHEAT_BTN}" onclick="cheatSkillLevels(250)">⬆ Skills 250</button>
        </div>
        <div>
          <button style="${CHEAT_BTN}" onclick="cheatTeachLevel(100)">🎓 Teach 100</button>
          <button style="${CHEAT_BTN}" onclick="cheatUnlockAll()">🔓 Unlock all</button>
          <button style="${CHEAT_BTN}" onclick="cheatMaxSpheres()">🔮 Spheres max</button>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:4px;">
          <div style="font-size:.66rem;color:var(--muted,#9a8cc0);margin:2px;">Click a sphere to cycle its level 0→5:</div>
          ${sphereBtns}
        </div>
        <div style="border-top:1px solid var(--border);padding-top:4px;">
          <button style="${CHEAT_BTN}border-color:var(--accent);" onclick="cheatResetSave()">♻ Reset save</button>
        </div>
      </div>
    </details>`;
}

loadGame();
checkUnlocks();
Device.onChange(() => {
  if (!Device.isMobile) closeMobileMenu();
  renderAll();
});
renderAll();
buildCheatMenu();
</script>
</body>
</html>
