<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mage: The Ascension — Idle</title>
  <style>
    :root {
      --bg:       #0e0b16;
      --panel:    #16112a;
      --panel2:   #1e1835;
      --border:   #3d2b5e;
      --accent:   #c41e3a;
      --magic:    #8b5cf6;
      --text:     #e2d9f3;
      --subtext:  #9d8ec7;
      --gold:     #d4a843;
      --danger:   #ef4444;
      --xpbar:    #3b1f6e;
      --nav-height: 0px;
      --header-height: 0px;
      --bottom-bar-height: 72px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--panel);
      border-bottom: 2px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .resources {
      display: flex;
      gap: 24px;
    }
    .resource { text-align: center; }
    .resource-label {
      font-size: 0.6rem;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .resource-label-short {
      display: none;
      text-decoration: none;
    }
    .total-level-badge { display: none; }
    .header-actions { display: contents; }
    .resource-value {
      font-size: 1.05rem;
      color: var(--gold);
      font-weight: bold;
      min-width: 52px;
      display: block;
    }

    /* ── Main area ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Skill sidebar ── */
    .skill-sidebar {
      width: 165px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 12px 0;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--subtext);
      padding: 0 18px 8px;
    }
    .skill-tab {
      padding: 11px 18px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      color: var(--subtext);
      font-size: 0.9rem;
    }
    @media (hover: hover) {
      .skill-tab:hover { background: var(--panel2); color: var(--text); }
    }
    .skill-tab.active {
      border-left-color: var(--accent);
      background: var(--panel2);
      color: var(--text);
    }
    .skill-lv {
      font-size: 0.65rem;
      color: var(--magic);
      margin-top: 2px;
    }
    .active-mark {
      color: var(--gold);
      animation: pulse-mark 1.6s ease-in-out infinite;
    }
    .upgrade-ready {
      color: var(--gold);
      margin-left: 4px;
    }
    @keyframes pulse-mark {
      0%, 100% { opacity: 0.45; }
      50%      { opacity: 1; }
    }

    /* ── Activity list ── */
    .activity-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .panel-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .panel-header h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--subtext);
    }
    .xp-label {
      font-size: 0.68rem;
      color: var(--subtext);
    }
    .xp-bar-wrap {
      background: var(--xpbar);
      border-radius: 3px;
      height: 5px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .xp-bar {
      height: 100%;
      border-radius: 3px;
      background: var(--magic);
      transition: width 0.3s;
    }

    .activity-item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    @media (hover: hover) {
      .activity-item:hover:not(.locked):not(.running) {
        border-color: var(--accent);
        background: var(--panel2);
      }
    }
    .activity-item.running {
      border-color: var(--magic);
      background: #1e1640;
    }
    .activity-item.locked {
      opacity: 0.38;
      cursor: not-allowed;
    }
    .activity-name { font-size: 0.88rem; }
    .activity-unlock-note {
      font-size: 0.68rem;
      color: var(--danger);
      margin-top: 3px;
    }
    .activity-meta { text-align: right; font-size: 0.72rem; color: var(--subtext); }
    .activity-reward { color: var(--gold); margin-bottom: 2px; }
    .activity-cost { color: var(--accent); margin-bottom: 2px; }
    .activity-risk { color: var(--danger); font-size: 0.66rem; margin-top: 3px; }

    /* ── Unlocks ── */
    .sidebar-divider {
      border-top: 1px solid var(--border);
      margin: 10px 18px;
    }
    .unlock-item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 13px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .unlock-item.done { border-color: var(--gold); }
    .unlock-name { font-size: 0.9rem; }
    .unlock-desc { font-size: 0.7rem; color: var(--subtext); margin-top: 3px; }
    .unlock-state {
      font-size: 0.75rem;
      color: var(--subtext);
      white-space: nowrap;
      margin-left: 16px;
    }
    .unlock-item.done .unlock-state { color: var(--gold); }
    .unlock-item.dimmed { opacity: 0.38; }

    /* ── Upgrades ── */
    .upgrade-group {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--subtext);
      margin: 18px 0 8px;
    }
    .buy-btn {
      background: var(--panel2);
      border: 1px solid var(--magic);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.72rem;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    @media (hover: hover) {
      .buy-btn:hover:not(:disabled) { background: #2a1f4d; }
    }
    .buy-btn:disabled {
      border-color: var(--border);
      color: var(--subtext);
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* ── Spheres ── */
    .sphere-dots {
      color: var(--magic);
      font-size: 0.8rem;
      letter-spacing: 3px;
      margin-left: 8px;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      flex-shrink: 0;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: border-top-color 0.3s;
    }
    .bottom-bar.setback-mode { border-top-color: var(--danger); }
    .bar-sublabel {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--subtext);
      margin-bottom: 4px;
    }
    .bar-sublabel.danger { color: var(--danger); }
    .bar-name {
      font-size: 0.95rem;
      margin-bottom: 7px;
    }
    .bar-timer {
      font-size: 0.75rem;
      color: var(--subtext);
      margin-left: 8px;
    }
    .prog-wrap {
      background: #1e1530;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(to right, var(--magic), var(--accent));
      transition: width 0.12s linear;
    }
    .prog-fill.setback-fill {
      background: linear-gradient(to right, #7f1d1d, var(--danger));
    }
    .idle-msg {
      color: var(--subtext);
      font-style: italic;
      font-size: 0.88rem;
    }

    /* ── Save controls ── */
    .save-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .save-btn {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--subtext);
      font-family: inherit;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    @media (hover: hover) {
      .save-btn:hover { border-color: var(--magic); color: var(--text); }
      .save-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    }
    .save-status {
      font-size: 0.62rem;
      color: var(--magic);
      min-width: 52px;
      text-align: right;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .save-status.show { opacity: 1; }

    /* ── Mobile menu & header controls ── */
    .header-top {
      display: contents;
    }
    .menu-btn {
      display: none;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 1.1rem;
      line-height: 1;
      min-width: 44px;
      min-height: 44px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .mobile-menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 90;
    }
    .mobile-menu-backdrop[hidden] {
      display: none;
    }
    .mobile-menu {
      position: fixed;
      top: var(--header-height);
      right: 0;
      bottom: 0;
      width: min(280px, 85vw);
      background: var(--panel);
      border-left: 1px solid var(--border);
      z-index: 100;
      flex-direction: column;
      padding: 16px;
      padding-bottom: calc(16px + var(--safe-bottom));
    }
    .mobile-menu:not([hidden]) {
      display: flex;
    }
    .mobile-menu[hidden] {
      display: none !important;
    }
    .mobile-menu-header {
      margin-bottom: 20px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--subtext);
    }
    .mobile-menu-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .mobile-menu-actions .save-btn {
      font-size: 0.75rem;
      padding: 12px 14px;
      min-height: 44px;
    }
    .mobile-menu-actions .save-status {
      opacity: 1;
      text-align: left;
      min-width: 0;
    }

    /* ── Tablet ── */
    @media (max-width: 1024px) {
      .skill-sidebar { width: 130px; }
      header { padding: 10px 16px; }
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      :root {
        --nav-height: 56px;
      }
      header {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        padding: 8px 12px;
      }
      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      header h1 {
        font-size: 0.85rem;
        letter-spacing: 2px;
        flex: 1;
        min-width: 0;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .total-level-badge {
        display: flex;
        align-items: baseline;
        gap: 4px;
      }
      .total-level-label {
        font-size: 0.75rem;
        color: var(--subtext);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .total-level-badge .resource-value {
        font-size: 0.95rem;
        min-width: 0;
        font-variant-numeric: tabular-nums;
      }
      .menu-btn { display: block; }
      body.menu-open header {
        position: relative;
        z-index: 110;
      }
      .resource-total-level { display: none; }
      .resources {
        display: flex;
        gap: 6px;
        overflow: visible;
      }
      .resource {
        flex: 1 1 0;
        min-width: 0;
      }
      .resource-label { display: none; }
      .resource-label-short {
        display: block;
        font-size: 0.75rem;
        color: var(--subtext);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .resource-value {
        font-size: 0.8rem;
        min-width: 0;
        max-width: 100%;
        font-variant-numeric: tabular-nums;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .save-controls { display: none; }

      .main {
        flex-direction: column;
        flex: 1;
        min-height: 0;
        position: relative;
      }
      .activity-panel {
        flex: 1;
        padding: 12px 16px;
        padding-bottom: calc(var(--nav-height) + var(--bottom-bar-height) + var(--safe-bottom) + 12px);
      }
      .skill-sidebar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: var(--safe-bottom);
        width: 100%;
        height: var(--nav-height);
        display: flex;
        flex-direction: row;
        align-items: stretch;
        overflow-x: auto;
        overflow-y: hidden;
        border-right: none;
        border-top: 1px solid var(--border);
        padding: 0;
        z-index: 20;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .skill-sidebar::-webkit-scrollbar { display: none; }
      .sidebar-title,
      .sidebar-divider { display: none; }
      .skill-tab {
        flex: 0 0 auto;
        min-width: 72px;
        padding: 8px 10px;
        border-left: none;
        border-top: 3px solid transparent;
        text-align: center;
        font-size: 0.72rem;
        touch-action: manipulation;
      }
      .skill-tab.active {
        border-left-color: transparent;
        border-top-color: var(--accent);
      }
      .skill-lv { font-size: 0.58rem; }

      .bottom-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: calc(var(--nav-height) + var(--safe-bottom));
        z-index: 15;
        padding: 10px 16px;
        min-height: var(--bottom-bar-height);
      }

      .activity-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding: 14px 16px;
        min-height: 48px;
        touch-action: manipulation;
      }
      .activity-meta {
        text-align: left;
        width: 100%;
      }
      .unlock-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .unlock-state {
        margin-left: 0;
        white-space: normal;
      }
      .buy-btn {
        min-height: 44px;
        padding: 10px 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .active-mark { animation: none; opacity: 1; }
      .xp-bar, .prog-fill { transition: none; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Mage: The Ascension</h1>
    <div class="header-actions">
      <div class="total-level-badge" title="Total Level">
        <span class="total-level-label">Lv</span>
        <span class="resource-value total-level-value" id="r-total-level-mobile" style="color:var(--magic)">0</span>
      </div>
      <button type="button" class="menu-btn" id="menu-btn" onclick="toggleMobileMenu()" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">☰</button>
    </div>
  </div>
  <div class="resources">
    <div class="resource resource-total-level">
      <span class="resource-label">Total Level</span>
      <span class="resource-value total-level-value" id="r-total-level" style="color:var(--magic)">0</span>
    </div>
    <div class="resource">
      <span class="resource-label">Knowledge</span>
      <abbr class="resource-label-short" title="Knowledge">Know</abbr>
      <span class="resource-value" id="r-knowledge">0</span>
    </div>
    <div class="resource">
      <span class="resource-label">Money</span>
      <abbr class="resource-label-short" title="Money">Money</abbr>
      <span class="resource-value" id="r-money">0</span>
    </div>
    <div class="resource">
      <span class="resource-label">Power</span>
      <abbr class="resource-label-short" title="Power">Power</abbr>
      <span class="resource-value" id="r-power">0</span>
    </div>
    <div class="resource">
      <span class="resource-label">Quintessence</span>
      <abbr class="resource-label-short" title="Quintessence">Quint</abbr>
      <span class="resource-value" id="r-quintessence">0</span>
    </div>
    <div class="resource">
      <span class="resource-label">Renown</span>
      <abbr class="resource-label-short" title="Renown">Renown</abbr>
      <span class="resource-value" id="r-renown">0</span>
    </div>
  </div>
  <div class="save-controls">
    <span class="save-status" id="save-status"></span>
    <button class="save-btn" onclick="saveGame(true)">Save</button>
    <button class="save-btn" onclick="exportSave()">Export</button>
    <button class="save-btn" onclick="importSave()">Import</button>
    <button class="save-btn danger" onclick="resetSave()">Reset</button>
  </div>
</header>

<div class="main">
  <nav class="skill-sidebar" id="skill-sidebar"></nav>
  <section class="activity-panel" id="activity-panel"></section>
</div>

<div class="bottom-bar" id="bottom-bar">
  <span class="idle-msg">Select an activity to begin.</span>
</div>

<div id="mobile-menu-backdrop" class="mobile-menu-backdrop" hidden onclick="closeMobileMenu()"></div>
<aside id="mobile-menu" class="mobile-menu" hidden aria-label="Game menu">
  <div class="mobile-menu-header">
    <span>Game Menu</span>
  </div>
  <div class="mobile-menu-actions">
    <span class="save-status" id="save-status-mobile"></span>
    <button type="button" class="save-btn" onclick="saveGame(true); closeMobileMenu()">Save</button>
    <button type="button" class="save-btn" onclick="exportSave(); closeMobileMenu()">Export</button>
    <button type="button" class="save-btn" onclick="importSave(); closeMobileMenu()">Import</button>
    <button type="button" class="save-btn danger" onclick="resetSave(); closeMobileMenu()">Reset</button>
  </div>
</aside>

<script>
// ─────────────────────────────────────────────
// DEVICE / RESPONSIVE
// ─────────────────────────────────────────────
const BREAKPOINTS = { mobile: 640, tablet: 1024 };

const Device = {
  width: 0,
  height: 0,
  isMobile: false,
  isTablet: false,
  isDesktop: false,
  isTouch: false,
  orientation: 'portrait',

  refresh() {
    this.width  = window.innerWidth;
    this.height = window.innerHeight;
    this.isMobile  = this.width <= BREAKPOINTS.mobile;
    this.isTablet  = this.width > BREAKPOINTS.mobile && this.width <= BREAKPOINTS.tablet;
    this.isDesktop = this.width > BREAKPOINTS.tablet;
    this.isTouch   = window.matchMedia('(pointer: coarse)').matches;
    this.orientation = this.width >= this.height ? 'landscape' : 'portrait';

    document.body.dataset.device =
      this.isMobile ? 'mobile' : this.isTablet ? 'tablet' : 'desktop';
    document.body.dataset.orientation = this.orientation;

    return this;
  },

  onChange(cb) {
    const onResize = () => { this.refresh(); cb(this); };
    window.addEventListener('resize', onResize);
    window.matchMedia(`(max-width: ${BREAKPOINTS.mobile}px)`).addEventListener('change', onResize);
    window.matchMedia(`(max-width: ${BREAKPOINTS.tablet}px)`).addEventListener('change', onResize);
    this.refresh();
  },
};

let mobileMenuOpen = false;

function syncHeaderHeight() {
  const header = document.querySelector('header');
  if (!header) return;
  document.documentElement.style.setProperty('--header-height', `${header.offsetHeight}px`);
}

function syncMobileMenu(open) {
  mobileMenuOpen = open;
  const menu = document.getElementById('mobile-menu');
  const backdrop = document.getElementById('mobile-menu-backdrop');
  const btn = document.getElementById('menu-btn');
  if (menu) menu.hidden = !open;
  if (backdrop) backdrop.hidden = !open;
  document.body.classList.toggle('menu-open', open);
  if (btn) {
    btn.textContent = open ? '✕' : '☰';
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    btn.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
  }
}

function toggleMobileMenu() {
  if (!Device.isMobile) return;
  syncMobileMenu(!mobileMenuOpen);
}

function openMobileMenu() {
  if (!Device.isMobile) return;
  syncMobileMenu(true);
}

function closeMobileMenu() {
  syncMobileMenu(false);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && mobileMenuOpen) closeMobileMenu();
});

const headerEl = document.querySelector('header');
if (headerEl) {
  syncHeaderHeight();
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncHeaderHeight).observe(headerEl);
  } else {
    window.addEventListener('resize', syncHeaderHeight);
  }
}

// ─────────────────────────────────────────────
// SKILLS & ACTIVITIES DATA
// ─────────────────────────────────────────────
const SKILLS = {
  study: {
    name: 'Study',
    resource: 'knowledge',
    risky: false,
    activities: [
      { name: 'Browse occult forums online',           dur: 5,   reward: 1.0  },
      { name: "Read a beginner's occult book",         dur: 8,   reward: 1.7  },
      { name: 'Self Study',                            dur: 12,  reward: 2.7  },
      { name: 'Read Occult Lore',                      dur: 18,  reward: 4.2  },
      { name: 'Attend a chantry lecture',              dur: 27,  reward: 6.5  },

// ─────────────────────────────────────────────
// UNLOCKS
// ─────────────────────────────────────────────
// Conditions check lifetime totals (S.total) or other monotonic
// values (total level), so spending resources never re-locks anything.
const UNLOCKS = [
  { id: 'fight',  name: 'Fight',  desc: 'Spend Power to win battles and earn Renown.',   res: 'power', amount: 10 },
  { id: 'barter', name: 'Barter', desc: 'Spend Money to trade for Quintessence.',        res: 'money', amount: 10 },
  { id: 'spheres', name: 'Spheres', desc: 'Spend EXP to awaken the Nine Spheres of magick.',
    cond: () => totalLevel() >= 30, progress: () => `${totalLevel()} / 30 total level` },
  { id: 'craft', name: 'Craft', desc: 'Channel Quintessence into talismans that grant temporary boons. Deepens with the Prime sphere.',
    cond: () => S.spheres.prime >= 1, progress: () => `Prime ${S.spheres.prime} / 1` },
  { id: 'teach', name: 'Teach', desc: 'Spend Renown to recruit apprentices who gather resources for you.',
    res: 'renown', amount: 50 },
];

function isSkillUnlocked(id) { return !(id in S.unlocked) || S.unlocked[id]; }

function unlockMet(u) { return u.cond ? u.cond() : S.total[u.res] >= u.amount; }

function checkUnlocks() {
  let changed = false;
  for (const u of UNLOCKS) {
    if (!S.unlocked[u.id] && unlockMet(u)) {
      S.unlocked[u.id] = true;
      changed = true;
      flashSaveStatus('Unlocked: ' + u.name);
    }
  }
  if (changed) {
    renderSidebar();
    if (S.tab === 'unlocks') renderActivities();
  }
}

function gainRes(res, amt) {
  S.res[res] += amt;
  S.total[res] += amt;
  checkUnlocks();
}

// Consumption skills (Fight, Barter) pay their cost at the start of
// each cycle. Returns false without deducting if it can't be afforded.
function tryPayCost(skillId, sk, act) {
  if (act.costAll) { // special multi-resource cost (Kill an Avatar)
    for (const r in act.costAll) if ((S.res[r] || 0) < act.costAll[r]) return false;
    for (const r in act.costAll) S.res[r] -= act.costAll[r];
    return true;
  }
  if (!sk.costRes) return true;
  const cost = actCost(skillId, act);
  if (S.res[sk.costRes] < cost) return false;
  S.res[sk.costRes] -= cost;
  return true;
}

// UPGRADES
// ─────────────────────────────────────────────
// Each skill has six upgrades (at levels 5/10/25/50/80/100); each
// doubles that skill's payoff. Every upgrade is bought with Knowledge —
// the single universal upgrade currency. Knowledge is produced only by
// Study and Investigate, so funding upgrades for the other skills means
// diverting effort to research, which is the main sink that gives
// Knowledge its value. The exponential cost curve is matched to the
// level gates and to the payoff doublings, so it stays a meaningful
// long-term grind without becoming unreachable.
const UPGRADE_CURRENCY = 'knowledge';
const UPGRADE_LEVELS = [5, 10, 25, 50, 80, 100];
const UPGRADE_COSTS  = [50, 250, 1250, 6250, 31250, 156250];

// Teach joins the upgrade list as a pseudo-skill (its level lives in S.teach).
const UPGRADE_SKILLS = [...SKILL_IDS, 'teach'];

const UPGRADES = [];
for (const skillId of UPGRADE_SKILLS) {
  UPGRADE_NAMES[skillId].forEach((name, i) => {
    UPGRADES.push({
      id: `${skillId}-${i}`,
      skillId, name,
      lvReq: UPGRADE_LEVELS[i],
      cost: UPGRADE_COSTS[i],
      costRes: UPGRADE_CURRENCY,
    });
  });
}

// Current level of an upgrade's skill — Teach's lives in S.teach.
function skillLevel(skillId) {
  return skillId === 'teach' ? S.teach.lv : S.skills[skillId].lv;
}
// Display name for an upgrade group (Teach isn't in SKILLS).
function skillDisplayName(skillId) {
  return skillId === 'teach' ? 'Teach' : SKILLS[skillId].name;
}

function payoffMult(skillId) {
  let m = 1;
  for (const u of UPGRADES) if (u.skillId === skillId && S.upgrades[u.id]) m *= 2;
  return m;
}

// True when at least one upgrade can be bought right now (level met,
// affordable, not yet owned) — used to flag the Upgrades tab.
function hasAffordableUpgrade() {
  return UPGRADES.some(u =>
    !S.upgrades[u.id] &&
    skillLevel(u.skillId) >= u.lvReq &&
    S.res[u.costRes] >= u.cost);
}

function buyUpgrade(uid) {
  const u = UPGRADES.find(x => x.id === uid);
  if (!u || S.upgrades[u.id]) return;
  if (skillLevel(u.skillId) < u.lvReq) return;
  if (S.res[u.costRes] < u.cost) return;

  S.res[u.costRes] -= u.cost;
  S.upgrades[u.id] = true;
  flashSaveStatus('Purchased: ' + u.name);
  renderResources();
  renderSidebar();
  renderActivities();
}

// ─────────────────────────────────────────────
// EXP is earned at 1 per skill level-up (lifetime EXP = total level)
// and spent on Sphere levels. Available EXP is derived rather than
// stored so it can never drift out of sync with skill levels.
const SPHERES = [
  { id: 'correspondence', name: 'Correspondence' },
  { id: 'entropy',        name: 'Entropy' },
  { id: 'forces',         name: 'Forces' },
  { id: 'life',           name: 'Life' },
  { id: 'matter',         name: 'Matter' },
  { id: 'mind',           name: 'Mind' },
  { id: 'prime',          name: 'Prime' },
  { id: 'spirit',         name: 'Spirit' },
  { id: 'time',           name: 'Time' },
];
const SPHERE_MAX = 5;

function totalLevel() { return SKILL_IDS.reduce((sum, id) => sum + S.skills[id].lv, 0) + S.teach.lv; }

// Cost of the next level: first costs 5, then 5 × current level (5, 5, 10, 15, 20).
function sphereCost(lv) { return lv === 0 ? 5 : 5 * lv; }

function expSpent() {
  let spent = 0;
  for (const sp of SPHERES) {
    for (let l = 0; l < S.spheres[sp.id]; l++) spent += sphereCost(l);
  }
  return spent;
}
function expAvail() { return totalLevel() - expSpent(); }

function buySphere(id) {
  const lv = S.spheres[id];
  if (lv >= SPHERE_MAX) return;
  if (expAvail() < sphereCost(lv)) return;
  S.spheres[id]++;
  flashSaveStatus(SPHERES.find(sp => sp.id === id).name + ' ' + S.spheres[id]);
  grantSphereApprentices();   // Life 5 / Spirit 4 / Spirit 5 may grant a special apprentice
  renderSidebar();
  renderActivities();
}

// CRAFT
// ─────────────────────────────────────────────
// The mage channels Quintessence into talismans that grant temporary
// boons. Recipes unlock in groups ("tiers") as the Prime sphere deepens.
// Each item's effect lasts either for a number of matching activity
// completions ('charges') or for a span of game-time ('time', amount in
// seconds). Active items are listed in the Craft menu so the player can
// always see what is currently in effect.
//
// effect types (they combine multiplicatively across active items):
//   reward  → ×payoff of the produced resource      (mag > 1)
//   speed   → ×activity speed, i.e. shorter durations (mag > 1)
//   xp      → ×XP gained                             (mag > 1)
//   setback → ×setback chance on risky activities    (mag < 1, a reduction)
//   cost    → ×resource cost of consumption skills   (mag < 1, a reduction)
// scope is 'all', or a list of skill ids the effect applies to.
const CRAFT_ITEMS = [

const CRAFT_BY_ID = Object.fromEntries(CRAFT_ITEMS.map(it => [it.id, it]));
const CRAFT_MAX_TIER = Math.max(...CRAFT_ITEMS.map(it => it.tier));

// Highest craftable tier — one tier per level of the Prime sphere.
function craftTierUnlocked() { return S.spheres.prime; }

// Combined multiplier from every active item matching (skillId, effect).
function craftFactor(skillId, effect) {
  let f = 1;
  for (const a of S.craftActive) {
    const def = CRAFT_BY_ID[a.id];
    if (!def || def.effect !== effect) continue;
    if (def.scope !== 'all' && !def.scope.includes(skillId)) continue;
    f *= def.mag;
  }
  return f;
}

// ─────────────────────────────────────────────
// SPHERE EFFECTS — global modifiers (Phase 1)
// ─────────────────────────────────────────────
// Each sphere (level 0–5) grants passive effects. The hub below reads the
// current sphere levels and returns the combined modifiers applied to the
// PLAYER's own activities. Apprentices are not affected here — they have
// their own sphere effects (Life/Mind), handled separately. Stacking rules:
//   • XP per-level bonuses are ADDITIVE (+10% per level across 7 spheres),
//     then Time 5 doubles all skill XP on top (multiplicative).
//   • Speed and reward bonuses are MULTIPLICATIVE (e.g. Corr 5 × Time 3 = ×4).
//   • Setback-chance reductions are MULTIPLICATIVE (combine with Craft boons).
const sph = id => S.spheres[id];

// Skills whose activities produce Power (Forces 3pt speeds these up).
const POWER_SKILLS = ['prepare', 'explore'];
// Spheres that grant +10% skill XP per level at 1pt (additive among themselves).
const XP_BONUS_SPHERES = ['correspondence','entropy','forces','life','matter','mind','spirit'];

// Skill-XP multiplier: additive +10%/level, then Time 5pt ×2.
function sphereXpMult() {
  let bonus = 0;
  for (const id of XP_BONUS_SPHERES) bonus += 0.10 * sph(id);
  let m = 1 + bonus;
  if (sph('time') >= 5) m *= 2;          // Time 5pt: 2× all skill XP
  return m;
}

// Activity speed multiplier (higher = faster). 'all'-scope effects hit every
// skill (incl. Teach Didactics); scoped effects check skillId.
function sphereSpeedMult(skillId) {
  let m = 1;
  if (sph('time') >= 1) m *= 1 + 0.10 * sph('time');               // Time 1pt: +10%/level
  if (sph('correspondence') >= 5) m *= 2;                          // Corr 5pt: ×2 all
  if (sph('time') >= 3) m *= 2;                                    // Time 3pt: ×2 all
  if (sph('forces') >= 3 && POWER_SKILLS.includes(skillId)) m *= 1.4; // Forces 3pt: Power ×1.4
  if (sph('mind') >= 4 && skillId === 'study') m *= 2;            // Mind 4pt: Study ×2
  return m;
}

// Reward (payoff) multiplier from spheres, per skill.
function sphereRewardMult(skillId) {
  let m = 1;
  if (skillId === 'fight')  m *= sph('forces') >= 4 ? 1.5 : sph('forces') >= 2 ? 1.25 : 1; // Forces 2/4pt (4 replaces 2)
  if (skillId === 'barter') m *= sph('spirit') >= 3 ? 2   : sph('spirit') >= 2 ? 1.5  : 1; // Spirit 2/3pt (3 → ×2)
  return m;
}

// Chance (0–1) that a player activity pays out double (Entropy 4/5pt; 5 replaces 4).
function sphereDoubleRewardChance() {
  return sph('entropy') >= 5 ? 0.20 : sph('entropy') >= 4 ? 0.10 : 0;
}

// Setback-chance multiplier (lower = safer); multiplies with Craft setback boons.
function sphereSetbackMult(skillId) {
  let m = 1;
  if (sph('entropy') >= 2) m *= 0.85;                       // Entropy 2pt: −15%
  if (sph('time') >= 2)    m *= 0.80;                       // Time 2pt: −20%
  if (sph('forces') >= 5 && skillId === 'fight') m *= 0;    // Forces 5pt: Fight never fails
  return m;
}

// ── Apprentice-facing sphere effects (Phase 2) ──
// These shape apprentices, separate from the player's own modifiers above.
function sphereApprSpeedMult()        { return sph('life') >= 4 ? 2 : 1; }   // Life 4pt: work 2× faster
function sphereApprXpMult()           { return sph('mind') >= 5 ? 3 : 1; }   // Mind 5pt: XP 3× faster
function sphereApprSetbackDurMult()   { return sph('life') >= 3 ? 0.5 : 1; } // Life 3pt: recover 2× faster
function sphereExtraApprenticeSlots() { return sph('mind') >= 2 ? 1 : 0; }   // Mind 2pt: +1 slot
// Player setback recovery: Life 2pt halves it, Life 3pt thirds it (3 replaces 2).
function spherePlayerSetbackDurMult() { return sph('life') >= 3 ? 1/3 : sph('life') >= 2 ? 1/2 : 1; }

// Some activities also gate on a sphere level (e.g. Corr 2 → Reach Through Space).
function actSphereMet(act)  { return !act.sphereReq || sph(act.sphereReq.id) >= act.sphereReq.lv; }
function sphereReqText(act) { return act.sphereReq ? SPHERES.find(sp => sp.id === act.sphereReq.id).name + ' ' + act.sphereReq.lv : ''; }
// Text for an activity's cost — supports the normal single costRes and the
// special multi-resource costAll (Kill an Avatar). Empty when there's no cost.
function actCostText(skillId, act) {
  if (act.costAll) return Object.entries(act.costAll).map(([r, a]) => `−${fmt(a)} ${r}`).join(' · ');
  const c = SKILLS[skillId].costRes ? actCost(skillId, act) : 0;
  return c > 0 ? `−${fmt(c)} ${SKILLS[skillId].costRes}` : '';
}
// Text for an activity's reward — supports rewardAll (Kill an Avatar).
function actRewardText(skillId, act) {
  if (act.rewardAll) return Object.entries(act.rewardAll).map(([r, a]) => `+${fmt(a)} ${r}`).join(' · ');
  return `+${fmt(actReward(SKILLS[skillId], act) * payoffMult(skillId) * craftFactor(skillId, 'reward') * sphereRewardMult(skillId))} ${SKILLS[skillId].resource}`;
}

function actCost(skillId, act) {
  return act.cost * craftFactor(skillId, 'cost');
}

// Spend one charge from each charge-based item that applies to skillId,
// dropping any item whose charges run out.
function consumeCraftCharges(skillId) {
  for (let i = S.craftActive.length - 1; i >= 0; i--) {
    const a   = S.craftActive[i];
    const def = CRAFT_BY_ID[a.id];
    if (!def || def.mode !== 'charges') continue;
    if (def.scope !== 'all' && !def.scope.includes(skillId)) continue;
    if (--a.remaining <= 0) S.craftActive.splice(i, 1);
  }
}

// Tick down time-based items; returns true if any item expired this frame.
function updateCraftTimers(dt) {
  let removed = false;
  for (let i = S.craftActive.length - 1; i >= 0; i--) {
    const a   = S.craftActive[i];
    const def = CRAFT_BY_ID[a.id];
    if (!def || def.mode !== 'time') continue;
    a.remaining -= dt;
    if (a.remaining <= 0) { S.craftActive.splice(i, 1); removed = true; }
  }
  return removed;
}

function hasActiveCraftTimer() {
  return S.craftActive.some(a => { const d = CRAFT_BY_ID[a.id]; return d && d.mode === 'time'; });
}

function craftItem(id) {
  const def = CRAFT_BY_ID[id];
  if (!def) return;
  if (craftTierUnlocked() < def.tier) return;
  if (S.craftActive.some(a => a.id === id)) return;   // already active — wait for it to expire
  if (S.res.quintessence < def.cost) return;

  S.res.quintessence -= def.cost;
  S.craftActive.push({ id, remaining: def.amount });

  flashSaveStatus('Crafted: ' + def.name);
  renderResources();
  renderSidebar();
  renderActivities();
}

// ─────────────────────────────────────────────
// TEACH
// ─────────────────────────────────────────────
// Unlike the other skills, Teach is not an activity ladder. The mage
// spends Renown to recruit apprentices, who then gather resources
// passively, in parallel with whatever the player is doing.
//
// An apprentice is assigned a single skill type and performs a generic
// version of it: half the speed a player of the same level would have,
// with a reward derived purely from the apprentice's own level.
//   reward = APPR_BASE_REWARD × (1 + level × APPR_K)
//   dur    = APPR_BASE_DUR / speed(level) × 2   (half speed)
// Cost skills (Fight/Barter) pay their cost from the player's pool;
// risky skills (Steal/Investigate/Explore) can backfire into a setback
// that locks only that apprentice. Apprentices need double the XP per
// level and cap at APPR_MAX_LEVEL.
const APPR_BASE_DUR    = 5;     // base duration of the generic activity
const APPR_BASE_REWARD = 1.0;   // base of the reward formula
const APPR_K           = 0.2;   // reward growth per apprentice level
const APPR_MAX_LEVEL   = 50;    // default cap (upgrades may raise later)
const APPR_RISK        = 1.0;   // representative risk for apprentice setbacks
const RECRUIT_BASE     = 120;   // s; base recruiting time
const RECRUIT_TIME_DIV = 200;   // more Renown → shorter recruit
const RECRUIT_MIN      = 10;    // s; floor on recruit time
const RECRUIT_LV_SCALE = 0.7;   // Renown → starting level (× √renown)
// Skills an apprentice can be assigned to (Teach/Craft excluded).
const ASSIGNABLE = ['study','prepare','venture','network','steal','investigate','explore','fight','barter'];

// Didactics: activities the player performs to train Teach directly. They
// grant Teach XP (their "reward") and unlock as Teach itself levels up.
// Duration grows per tier; XP scales slightly above duration so higher
// tiers are marginally more efficient.
const TEACH_ACTIVITIES = [
  { name: 'How to teach magic for dummies', dur: 5,   xp: 6,   unlockLv: 0  },
  { name: 'Study Advanced Didactics',       dur: 20,  xp: 32,  unlockLv: 20 },
  { name: 'Study Expert Didactics',         dur: 60,  xp: 120, unlockLv: 50 },
  { name: 'Master being a Master',          dur: 150, xp: 400, unlockLv: 80 },
];

// Real duration of a Didactics activity, sped up by the Teach level and any
// global sphere speed effects (Correspondence/Time apply to Didactics too).
function teachActDur(act) { return act.dur / (speed(S.teach.lv) * sphereSpeedMult('teach')); }

// Teach uses its own, gentler XP curve than the other skills (which grow
// at 1.2×/level). Slots and Didactics tiers gate on Teach level, so a
// softer curve keeps that progression reachable within a run.
const TEACH_XP_BASE   = 25;
const TEACH_XP_GROWTH = 1.07;
function xpToNextTeach(lv) { return Math.floor(TEACH_XP_BASE * Math.pow(TEACH_XP_GROWTH, lv)); }
function xpForTeachLevel(lv) {
  let total = 0;
  for (let i = 0; i < lv; i++) total += Math.floor(TEACH_XP_BASE * Math.pow(TEACH_XP_GROWTH, i));
  return total;
}

// Add Teach XP and apply any resulting level-ups (Teach counts toward
// Total Level, so a level-up may trip an unlock such as Spheres).
function gainTeachXp(amt) {
  S.teach.xp += amt;
  const before = S.teach.lv;
  while (S.teach.xp >= xpForTeachLevel(S.teach.lv + 1)) S.teach.lv++;
  if (S.teach.lv !== before) checkUnlocks();
}

// Slots grow with the Teach level, plus Mind 2pt. Special (sphere-granted)
// apprentices don't occupy a slot, so slot checks count only regular ones.
function maxApprentices() { return 1 + Math.floor(S.teach.lv / 10) + sphereExtraApprenticeSlots(); }
function regularApprentices() { return S.teach.apprentices.filter(a => !a.special).length; }

// Apprentices need twice the XP a player skill would need for the level.
function xpForApprenticeLevel(lv) { return 2 * xpForLevel(lv); }

// Cost paid per completion for a cost-based skill, derived from that
// skill's first activity ratio so it tracks the player economy.
function apprenticeCostRatio(sk) {
  const a0 = sk.activities[0];
  return sk.costRes ? a0.cost / a0.reward : 0;
}
// Teach upgrades (payoffMult) scale every apprentice's output.
function apprenticeReward(level) { return APPR_BASE_REWARD * (1 + level * APPR_K) * payoffMult('teach'); }
// Half a player's speed, then sped up by Life 4pt.
function apprenticeDur(level)    { return APPR_BASE_DUR / speed(level) * 2 / sphereApprSpeedMult(); }

// What a given Renown investment buys (central values; recruiting adds
// a small random spread to the level).
function recruitPreview(renown) {
  renown = Math.max(0, Math.floor(renown));
  const level = clamp(Math.round(RECRUIT_LV_SCALE * Math.sqrt(renown)), 1, APPR_MAX_LEVEL);
  const dur   = Math.max(RECRUIT_MIN, RECRUIT_BASE / (1 + renown / RECRUIT_TIME_DIV));
  return { level, dur };
}

function startRecruit(renown) {
  renown = Math.floor(renown);
  if (!isFinite(renown) || renown < 1) return;
  if (S.teach.recruiting) return;
  if (regularApprentices() >= maxApprentices()) return;
  if (S.res.renown < renown) return;

  S.res.renown -= renown;
  const { level, dur } = recruitPreview(renown);
  // Roll the actual starting level with ±15% spread.
  const rolled = clamp(Math.round(level * (0.85 + 0.30 * Math.random())), 1, APPR_MAX_LEVEL);
  S.teach.recruiting = { renown, level: rolled, progress: 0, dur };

  flashSaveStatus('Recruiting an apprentice…');
  renderResources();
  renderSidebar();
  renderActivities();
}

function assignApprentice(id, skillId) {
  const a = S.teach.apprentices.find(x => x.id === id);
  if (!a) return;
  if (skillId && (!ASSIGNABLE.includes(skillId) || !isSkillUnlocked(skillId))) return;
  a.assign = skillId || null;
  a.progress = 0;
  a.stalled = false;
  renderActivities();
}

function dismissApprentice(id) {
  const i = S.teach.apprentices.findIndex(x => x.id === id);
  if (i < 0) return;
  if (S.teach.apprentices[i].special) return; // sphere-bound allies can't be dismissed
  S.teach.apprentices.splice(i, 1);
  renderSidebar();
  renderActivities();
}

// ── Special apprentices (sphere-granted; don't occupy a slot) ──
// Life 5 / Spirit 5 forge a named lv-200 ally; Spirit 4 binds a lv-100 Djinn.
function makeSpecialApprentice(source, level, name) {
  return {
    id: S.teach.nextId++, special: true, source, name,
    level, xp: 0, assign: null, progress: 0, dur: 0, stalled: false,
    setback: { on: false, remaining: 0, total: 0 },
  };
}
function specialApprenticeName(source, silent) {
  if (source === 'spirit4') return 'Djinn';
  const fallback = source === 'life5' ? 'Homunculus' : 'Ephemera';
  const flavor = source === 'life5'
    ? 'You weave a flawless living being to aid your Ascension. Name it:'
    : 'You forge a powerful spirit to aid your Ascension. Name it:';
  let nm = null;
  if (!silent && typeof prompt === 'function') nm = prompt(flavor);
  return (nm && nm.trim()) || fallback;
}
const SPECIAL_APPR = [
  { source: 'life5',   need: () => sph('life')   >= 5, level: 200 },
  { source: 'spirit4', need: () => sph('spirit') >= 4, level: 100 },
  { source: 'spirit5', need: () => sph('spirit') >= 5, level: 200 },
];
// Grant any special apprentice whose sphere threshold is met and which the
// player doesn't already have. `silent` skips the naming prompt (used on load).
function grantSphereApprentices(silent) {
  let granted = false;
  for (const s of SPECIAL_APPR) {
    if (!s.need()) continue;
    if (S.teach.apprentices.some(a => a.source === s.source)) continue;
    const name = specialApprenticeName(s.source, silent);
    S.teach.apprentices.push(makeSpecialApprentice(s.source, s.level, name));
    flashSaveStatus('A bound ally joins you: ' + name + '!');
    granted = true;
  }
  return granted;
}

// Advance recruiting and every apprentice. Returns true only on a
// *structural* change (apprentice created/levelled, resource gained,
// setback started/ended) — i.e. something that alters the panel beyond a
// live countdown. Per-frame progress (recruit bar, setback timer) is left
// for refreshTeachLive() so the panel isn't rebuilt every frame, which
// would replace its buttons mid-click. Runs in parallel with the player.
function updateTeach(dt) {
  let structural = false;

  // ── Recruiting in progress ──
  const r = S.teach.recruiting;
  if (r) {
    r.progress += dt;
    if (r.progress >= r.dur) {
      S.teach.apprentices.push({
        id: S.teach.nextId++,
        level: r.level,
        xp: xpForApprenticeLevel(r.level),
        assign: null,
        progress: 0,
        dur: 0,
        setback: { on: false, remaining: 0, total: 0 },
      });
      // Recruiting trains the mage too.
      gainTeachXp(5 + r.level);
      S.teach.recruiting = null;
      flashSaveStatus('Apprentice recruited!');
      structural = true;
    }
    // else: only the live progress bar advanced (handled by refreshTeachLive)
  }

  // ── Active apprentices ──
  for (const a of S.teach.apprentices) {
    if (a.setback.on) {
      a.setback.remaining = Math.max(0, a.setback.remaining - dt);
      if (a.setback.remaining <= 0) { a.setback.on = false; structural = true; } // status changes
      continue; // while recovering, only the countdown ticks
    }
    if (!a.assign) continue;

    const sk  = SKILLS[a.assign];
    const dur = apprenticeDur(a.level);
    a.dur = dur;
    a.progress += dt;

    if (a.progress >= dur) {
      const reward = apprenticeReward(a.level);

      // Cost skills draw from the player's pool; pause if unaffordable.
      if (sk.costRes) {
        const cost = reward * apprenticeCostRatio(sk);
        if (S.res[sk.costRes] < cost) {
          a.progress = dur;
          // Surface the stall once (on transition) so the roster can explain it.
          if (!a.stalled) { a.stalled = true; structural = true; }
          continue;
        }
        S.res[sk.costRes] -= cost;
      }
      a.stalled = false;

      gainRes(sk.resource, reward);

      // Special apprentices have a fixed (sphere-granted) level; only regular
      // ones train up. Mind 5pt speeds the XP gain.
      if (!a.special) {
        a.xp += APPR_BASE_DUR * sphereApprXpMult();
        while (a.level < APPR_MAX_LEVEL && a.xp >= xpForApprenticeLevel(a.level + 1)) a.level++;
      }

      // Risky skills may backfire — locks only this apprentice. Life 3pt shortens recovery.
      if (sk.risky) {
        const chance = setbackChance(sk, { risk: APPR_RISK }, a.level);
        if (chance > 0 && Math.random() * 100 < chance) {
          const sbDur = setbackDur({ risk: APPR_RISK, dur: APPR_BASE_DUR }) * sphereApprSetbackDurMult();
          a.setback = { on: true, remaining: sbDur, total: sbDur };
        }
      }

      a.progress = 0;
      structural = true;
    }
  }

  return structural;
}

// True when the player is focused on a form control inside the activity
// panel (the recruit input or an apprentice's assignment dropdown). While
// that's the case we must not rebuild the panel, or it would drop focus /
// close the open dropdown mid-interaction.
function panelFieldFocused() {
  const a = typeof document !== 'undefined' ? document.activeElement : null;
  if (!a) return false;
  const t = a.tagName;
  if (t !== 'INPUT' && t !== 'SELECT' && t !== 'TEXTAREA') return false;
  const panel = document.getElementById('activity-panel');
  return !!(panel && panel.contains && panel.contains(a));
}

// Update only the live countdowns/bars on the Teach panel (recruit
// progress, apprentice setback timers) without rebuilding it.
function refreshTeachLive() {
  const r = S.teach.recruiting;
  if (r) {
    const fill  = document.getElementById('recruit-fill');
    const timer = document.getElementById('recruit-timer');
    if (fill)  fill.style.width = clamp((r.progress / r.dur) * 100, 0, 100) + '%';
    if (timer) timer.textContent = fmtTime(Math.max(0, r.dur - r.progress));
  }
  for (const a of S.teach.apprentices) {
    if (a.setback.on) {
      const node = document.getElementById('appr-status-' + a.id);
      if (node) node.textContent = `⚠ recovering · ${fmtTime(a.setback.remaining)}`;
      continue;
    }
    // Animate the activity-cycle bar of a working apprentice (skip when
    // stalled, so it stays full-and-frozen to signal the pause).
    if (a.assign && !a.stalled && a.dur > 0) {
      const bar = document.getElementById('appr-prog-' + a.id);
      if (bar) bar.style.width = clamp((a.progress / a.dur) * 100, 0, 100) + '%';
    }
  }
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function xpForLevel(lv) {
  // cumulative XP needed to reach `lv`
  let total = 0;
  for (let i = 1; i <= lv; i++) total += Math.floor(35 * Math.pow(1.2, i - 1));
  return total;
}
function xpToNext(lv) { return Math.floor(35 * Math.pow(1.2, lv)); }
function speed(lv)    { return 1 + lv * 0.05; }
// A crafted 'speed' boon and sphere speed effects shorten durations.
function effDur(baseDur, lv, skillId) {
  const cs = skillId ? craftFactor(skillId, 'speed') : 1;
  const ss = skillId ? sphereSpeedMult(skillId) : 1;
  return baseDur / (speed(lv) * cs * ss);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Risky activities pay a premium: +20% at risk 1.0, scaling with risk.
function actReward(sk, act) {
  return sk.risky ? act.reward * (1 + 0.2 * act.risk) : act.reward;
}
// Setback chance %: (40 × risk − skillLevel), reduced as the skill levels up.
function setbackChance(sk, act, lv) {
  return sk.risky ? clamp(40 * act.risk - lv, 0, 95) : 0;
}
// Recovery time: base 3×risk seconds, scaled by activity length (es baseline).
function setbackDur(act) {
  return 3 * act.risk * (act.dur / 5);
}

function fmt(n) {
  if (n < 1000)  return (Math.round(n * 10) / 10).toFixed(1);
  if (n < 1e6)   return (n / 1e3).toFixed(1) + 'k';
  if (n < 1e9)   return (n / 1e6).toFixed(2) + 'M';
  return (n / 1e9).toFixed(2) + 'B';
}
function fmtTime(s) {
  if (s >= 3600) return (s / 3600).toFixed(1) + 'h';
  if (s >= 60)   return (s / 60).toFixed(1) + 'm';
  return s.toFixed(1) + 's';
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const S = {
  res:   { knowledge: 0, money: 0, power: 0, quintessence: 0, renown: 0 },
  total: { knowledge: 0, money: 0, power: 0, quintessence: 0, renown: 0 }, // lifetime acquired
  skills: {
    study:       { lv: 0, xp: 0 },
    prepare:     { lv: 0, xp: 0 },
    venture:     { lv: 0, xp: 0 },
    network:     { lv: 0, xp: 0 },
    steal:       { lv: 0, xp: 0 },
    investigate: { lv: 0, xp: 0 },
    explore:     { lv: 0, xp: 0 },
    fight:       { lv: 0, xp: 0 },
    barter:      { lv: 0, xp: 0 },
  },
  unlocked: { fight: false, barter: false, spheres: false, craft: false, teach: false },
  upgrades: {},   // purchased upgrade ids → true
  spheres: Object.fromEntries(SPHERES.map(sp => [sp.id, 0])),
  craftActive: [], // active crafted boons → [{ id, remaining }] (remaining = charges or seconds)
  // Teach: own level/xp, recruited apprentices, and any recruit in progress.
  teach: { lv: 0, xp: 0, nextId: 1, apprentices: [], recruiting: null },
  tab:     'study',
  running: null,   // { skillId, idx, progress, dur }
  setback: { on: false, remaining: 0, total: 0 },
};

// Transient notice for the bottom bar (e.g. ran out of Power); not saved.
let haltMsg = '';

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
let last = performance.now();

function tick(now) {
  const dt = (now - last) / 1000; //speed // default: 1000
  last = now;

  // Crafted time-based boons count down in real time, even during a setback.
  const craftRemoved = updateCraftTimers(dt);
  if (craftRemoved) renderSidebar();
  if (S.tab === 'craft') {
    // Only a full rebuild when a boon expired (buttons change); otherwise
    // just tick the countdown text so the recipe buttons stay clickable.
    if (craftRemoved) renderActivities();
    else if (hasActiveCraftTimer()) refreshCraftTimers();
  }

  // Apprentices (and any recruit) work in parallel — even during a player setback.
  const teachStructural = updateTeach(dt);
  if (teachStructural) {
    renderResources();
    renderSidebar();
  }
  if (S.tab === 'teach') {
    // Rebuild the panel on a structural change, but NOT while the player is
    // typing in / using a field inside it — that would drop focus or close
    // an open dropdown. Otherwise just tick the live bars/timers in place.
    if (teachStructural && !panelFieldFocused()) renderActivities();
    else refreshTeachLive();
  }

  if (S.setback.on) {
    S.setback.remaining = Math.max(0, S.setback.remaining - dt);
    if (S.setback.remaining <= 0) { S.setback.on = false; }
    renderBottomBar();
    requestAnimationFrame(tick);
    return;
  }

  // While training an apprentice the mage is occupied — the player's own
  // activity is paused and cannot progress until recruiting finishes.
  if (S.teach.recruiting) {
    renderBottomBar();
    requestAnimationFrame(tick);
    return;
  }

  if (S.running && S.running.teach) {
    // Didactics: a player activity that yields Teach XP instead of a resource.
    const act = TEACH_ACTIVITIES[S.running.idx];
    const dur = teachActDur(act);
    S.running.progress += dt;
    S.running.dur = dur;

    if (S.running.progress >= dur) {
      gainTeachXp(act.xp * sphereXpMult());
      S.running = { teach: true, idx: S.running.idx, progress: 0, dur: teachActDur(act) };
      renderResources();
      renderSidebar();
      if (S.tab === 'teach') renderActivities();
    }

    renderBottomBar();
  } else if (S.running) {
    const { skillId, idx } = S.running;
    const sk   = SKILLS[skillId];
    const ss   = S.skills[skillId];
    const act  = sk.activities[idx];
    const dur  = effDur(act.dur, ss.lv, skillId);

    S.running.progress += dt;
    S.running.dur = dur;

    if (S.running.progress >= dur) {
      // Award resource(s). Most activities pay one resource (upgrade ×, crafted
      // boon, sphere payoff, and the Entropy 4/5pt double-reward roll). A few
      // special ones (Kill an Avatar) pay a fixed bundle via rewardAll.
      if (act.rewardAll) {
        for (const r in act.rewardAll) gainRes(r, act.rewardAll[r]);
      } else {
        let reward = actReward(sk, act) * payoffMult(skillId) * craftFactor(skillId, 'reward') * sphereRewardMult(skillId);
        if (Math.random() < sphereDoubleRewardChance()) reward *= 2;
        gainRes(sk.resource, reward);
      }

      // Award XP (proportional to base duration, boosted by 'xp' boons and
      // sphere XP effects); each level-up grants 1 EXP and may trip an unlock.
      ss.xp += act.dur * craftFactor(skillId, 'xp') * sphereXpMult();
      const lvBefore = ss.lv;
      while (ss.xp >= xpForLevel(ss.lv + 1)) ss.lv++;
      if (ss.lv !== lvBefore) checkUnlocks();

      // Risky activities may trigger a setback ('setback' boons and sphere effects reduce the odds)
      const chance = setbackChance(sk, act, ss.lv) * craftFactor(skillId, 'setback') * sphereSetbackMult(skillId);
      if (chance > 0 && Math.random() * 100 < chance) {
        const sbDur = setbackDur(act) * spherePlayerSetbackDurMult(); // Life 2/3pt shorten recovery
        S.setback = { on: true, remaining: sbDur, total: sbDur };
      }

      // Spend a charge from any charge-based boon that applied to this activity
      consumeCraftCharges(skillId);

      // Re-queue the activity; consumption skills must afford the next cycle
      if (tryPayCost(skillId, sk, act)) {
        S.running = { skillId, idx, progress: 0, dur: effDur(act.dur, ss.lv, skillId) };
      } else {
        S.running = null;
        haltMsg = `Not enough ${act.costAll ? Object.keys(act.costAll).join('/') : sk.costRes} to continue "${act.name}".`;
      }

      renderResources();
      renderSidebar();
      if (S.tab === skillId || S.tab === 'unlocks' || S.tab === 'upgrades' || S.tab === 'spheres' || S.tab === 'craft') renderActivities();
    }

    renderBottomBar();
  }

  requestAnimationFrame(tick);
}

// INTERACTION
// ─────────────────────────────────────────────
function selectTab(skillId) {
  S.tab = skillId;
  if (Device.isMobile) closeMobileMenu();
  renderSidebar();
  renderActivities();
}

function startActivity(skillId, idx) {
  if (S.setback.on) return;
  if (S.teach.recruiting) return;   // busy training — the bottom bar explains it
  const ss = S.skills[skillId];
  const sk  = SKILLS[skillId];
  const act = sk.activities[idx];
  if (!act || ss.lv < sk.unlocks[idx] || !actSphereMet(act)) return;

  if (!tryPayCost(skillId, sk, act)) {
    S.running = null;
    haltMsg = `Not enough ${act.costAll ? Object.keys(act.costAll).join('/') : sk.costRes} to start "${act.name}".`;
    renderActivities();
    renderBottomBar();
    return;
  }
  haltMsg = '';
  S.running = { skillId, idx, progress: 0, dur: effDur(act.dur, ss.lv, skillId) };

  renderResources();
  renderSidebar();
  renderActivities();
  renderBottomBar();
}

// Start a Didactics activity (player-performed, yields Teach XP).
function startTeachActivity(idx) {
  if (S.setback.on) return;
  if (S.teach.recruiting) return;   // busy training an apprentice
  const act = TEACH_ACTIVITIES[idx];
  if (!act || S.teach.lv < act.unlockLv) return;

  haltMsg = '';
  S.running = { teach: true, idx, progress: 0, dur: teachActDur(act) };

  renderSidebar();
  renderActivities();
  renderBottomBar();
}

    for (const u of UPGRADES.filter(x => x.skillId === skillId)) {
      const done   = !!S.upgrades[u.id];

      let state;
      if (done)        state = '✓ Purchased';

      else             state = `<button class="buy-btn" onclick="buyUpgrade('${u.id}')"${canBuy ? '' : ' disabled'}>
