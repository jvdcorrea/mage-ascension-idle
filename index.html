<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mage: The Ascension — Idle</title>
  <style>
    :root {
      --bg:       #0e0b16;
      --panel:    #16112a;
      --panel2:   #1e1835;
      --border:   #3d2b5e;
      --accent:   #c41e3a;
      --magic:    #8b5cf6;
      --text:     #e2d9f3;
      --subtext:  #9d8ec7;
      --gold:     #d4a843;
      --danger:   #ef4444;
      --xpbar:    #3b1f6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--panel);
      border-bottom: 2px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .resources {
      display: flex;
      gap: 24px;
    }
    .resource { text-align: center; }
    .resource-label {
      font-size: 0.6rem;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .resource-value {
      font-size: 1.05rem;
      color: var(--gold);
      font-weight: bold;
      min-width: 52px;
      display: block;
    }

    /* ── Main area ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Skill sidebar ── */
    .skill-sidebar {
      width: 165px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 12px 0;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--subtext);
      padding: 0 18px 8px;
    }
    .skill-tab {
      padding: 11px 18px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      color: var(--subtext);
      font-size: 0.9rem;
    }
    .skill-tab:hover { background: var(--panel2); color: var(--text); }
    .skill-tab.active {
      border-left-color: var(--accent);
      background: var(--panel2);
      color: var(--text);
    }
    .skill-lv {
      font-size: 0.65rem;
      color: var(--magic);
      margin-top: 2px;
    }

    /* ── Activity list ── */
    .activity-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .panel-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .panel-header h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--subtext);
    }
    .xp-label {
      font-size: 0.68rem;
      color: var(--subtext);
    }
    .xp-bar-wrap {
      background: var(--xpbar);
      border-radius: 3px;
      height: 5px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .xp-bar {
      height: 100%;
      border-radius: 3px;
      background: var(--magic);
      transition: width 0.3s;
    }

    .activity-item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .activity-item:hover:not(.locked):not(.running) {
      border-color: var(--accent);
      background: var(--panel2);
    }
    .activity-item.running {
      border-color: var(--magic);
      background: #1e1640;
    }
    .activity-item.locked {
      opacity: 0.38;
      cursor: not-allowed;
    }
    .activity-name { font-size: 0.88rem; }
    .activity-unlock-note {
      font-size: 0.68rem;
      color: var(--danger);
      margin-top: 3px;
    }
    .activity-meta { text-align: right; font-size: 0.72rem; color: var(--subtext); }
    .activity-reward { color: var(--gold); margin-bottom: 2px; }
    .activity-cost { color: var(--accent); margin-bottom: 2px; }
    .activity-risk { color: var(--danger); font-size: 0.66rem; margin-top: 3px; }

    /* ── Unlocks ── */
    .sidebar-divider {
      border-top: 1px solid var(--border);
      margin: 10px 18px;
    }
    .unlock-item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 13px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .unlock-item.done { border-color: var(--gold); }
    .unlock-name { font-size: 0.9rem; }
    .unlock-desc { font-size: 0.7rem; color: var(--subtext); margin-top: 3px; }
    .unlock-state {
      font-size: 0.75rem;
      color: var(--subtext);
      white-space: nowrap;
      margin-left: 16px;
    }
    .unlock-item.done .unlock-state { color: var(--gold); }
    .unlock-item.dimmed { opacity: 0.38; }

    /* ── Upgrades ── */
    .upgrade-group {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--subtext);
      margin: 18px 0 8px;
    }
    .buy-btn {
      background: var(--panel2);
      border: 1px solid var(--magic);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.72rem;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .buy-btn:hover:not(:disabled) { background: #2a1f4d; }
    .buy-btn:disabled {
      border-color: var(--border);
      color: var(--subtext);
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* ── Spheres ── */
    .sphere-dots {
      color: var(--magic);
      font-size: 0.8rem;
      letter-spacing: 3px;
      margin-left: 8px;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      flex-shrink: 0;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: border-top-color 0.3s;
    }
    .bottom-bar.setback-mode { border-top-color: var(--danger); }
    .bar-sublabel {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--subtext);
      margin-bottom: 4px;
    }
    .bar-sublabel.danger { color: var(--danger); }
    .bar-name {
      font-size: 0.95rem;
      margin-bottom: 7px;
    }
    .bar-timer {
      font-size: 0.75rem;
      color: var(--subtext);
      margin-left: 8px;
    }
    .prog-wrap {
      background: #1e1530;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(to right, var(--magic), var(--accent));
      transition: width 0.12s linear;
    }
    .prog-fill.setback-fill {
      background: linear-gradient(to right, #7f1d1d, var(--danger));
    }
    .idle-msg {
      color: var(--subtext);
      font-style: italic;
      font-size: 0.88rem;
    }

    /* ── Save controls ── */
    .save-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .save-btn {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--subtext);
      font-family: inherit;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;

    .save-btn:hover { border-color: var(--magic); color: var(--text); }
    .save-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    .save-status {
      font-size: 0.62rem;
      color: var(--magic);
      min-width: 52px;
      text-align: right;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .save-status.show { opacity: 1; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>

// ─────────────────────────────────────────────
// UNLOCKS
// ─────────────────────────────────────────────
// Conditions check lifetime totals (S.total) or other monotonic
// values (total level), so spending resources never re-locks anything.
const UNLOCKS = [
  { id: 'fight',  name: 'Fight',  desc: 'Spend Power to win battles and earn Renown.',   res: 'power', amount: 10 },
  { id: 'barter', name: 'Barter', desc: 'Spend Money to trade for Quintessence.',        res: 'money', amount: 10 },
  { id: 'spheres', name: 'Spheres', desc: 'Spend EXP to awaken the Nine Spheres of magick.',
    cond: () => totalLevel() >= 30, progress: () => `${totalLevel()} / 30 total level` },
  { id: 'craft', name: 'Craft', desc: 'Channel Quintessence into talismans that grant temporary boons. Deepens with the Prime sphere.',
    cond: () => S.spheres.prime >= 1, progress: () => `Prime ${S.spheres.prime} / 1` },
];

function isSkillUnlocked(id) { return !(id in S.unlocked) || S.unlocked[id]; }

function unlockMet(u) { return u.cond ? u.cond() : S.total[u.res] >= u.amount; }

function checkUnlocks() {
  let changed = false;
  for (const u of UNLOCKS) {
    if (!S.unlocked[u.id] && unlockMet(u)) {
      S.unlocked[u.id] = true;
      changed = true;
      flashSaveStatus('Unlocked: ' + u.name);
    }
  }
  if (changed) {
    renderSidebar();
    if (S.tab === 'unlocks') renderActivities();
  }
}

function gainRes(res, amt) {
  S.res[res] += amt;
  S.total[res] += amt;
  checkUnlocks();
}

// Consumption skills (Fight, Barter) pay their cost at the start of
// each cycle. Returns false without deducting if it can't be afforded.
function tryPayCost(skillId, sk, act) {
  if (!sk.costRes) return true;
  const cost = actCost(skillId, act);
  if (S.res[sk.costRes] < cost) return false;
  S.res[sk.costRes] -= cost;
  return true;
}

const UPGRADE_COSTS  = [50, 250, 1250, 6250, 31250, 156250];
const UPGRADE_NAMES = {
  study:       ['Study Notes', 'Personal Library', 'Mnemonic Techniques', 'Lucid Comprehension', 'Akashic Recall', 'Library of the Mind'],
  prepare:     ['Training Routine', 'Quality Gear', 'Combat Conditioning', 'Battle Meditation', 'Warded Equipment', 'Art of War Mastery'],
  venture:     ['Side Hustle', 'Smart Bookkeeping', 'Loyal Customers', 'Market Insight', 'Diversified Portfolio', 'Golden Touch'],
  network:     ['Business Cards', 'Charming Smile', 'Inner Circle', 'Public Reputation', 'Influential Friends', 'Voice of the Consensus'],
  steal:       ['Lockpicks', 'Soft Soles', 'Fence Contacts', 'Master Plan', 'Phantom Hands', 'Perfect Crime'],
  investigate: ['Notebook and Pen', 'Police Scanner', 'Informant Network', 'Forensic Eye', 'Pattern Recognition', 'All-Seeing Web'],
  explore:     ['Sturdy Boots', 'Detailed Maps', 'Survival Kit', 'Sixth Sense', 'Umbral Compass', 'Walker Between Worlds'],
  fight:       ['Fighting Stance', 'Trophy Collection', 'Signature Move', "Duelist's Honor", 'Feared Reputation', 'Legend of the Arena'],
  barter:      ['Haggling Basics', 'Trusted Trader', 'Rare Goods License', 'Tass Appraisal', 'Node Connections', 'Quintessence Monopoly'],
};

const UPGRADES = [];
for (const skillId of SKILL_IDS) {
  UPGRADE_NAMES[skillId].forEach((name, i) => {
    UPGRADES.push({
      id: `${skillId}-${i}`,
      skillId, name,
      lvReq: UPGRADE_LEVELS[i],
      cost: UPGRADE_COSTS[i],
      costRes: SKILLS[skillId].resource,
    });
  });
}

function payoffMult(skillId) {
  let m = 1;
  for (const u of UPGRADES) if (u.skillId === skillId && S.upgrades[u.id]) m *= 2;
  return m;
}

function buyUpgrade(uid) {
  const u = UPGRADES.find(x => x.id === uid);
  if (!u || S.upgrades[u.id]) return;
  if (S.skills[u.skillId].lv < u.lvReq) return;
  if (S.res[u.costRes] < u.cost) return;

  S.res[u.costRes] -= u.cost;
  S.upgrades[u.id] = true;
  flashSaveStatus('Purchased: ' + u.name);
  renderResources();
  renderSidebar();
  renderActivities();
}

// ─────────────────────────────────────────────
// SPHERES
// ─────────────────────────────────────────────
// EXP is earned at 1 per skill level-up (lifetime EXP = total level)
// and spent on Sphere levels. Available EXP is derived rather than
// stored so it can never drift out of sync with skill levels.
const SPHERES = [
  { id: 'correspondence', name: 'Correspondence' },
  { id: 'entropy',        name: 'Entropy' },
  { id: 'forces',         name: 'Forces' },
  { id: 'life',           name: 'Life' },
  { id: 'matter',         name: 'Matter' },
  { id: 'mind',           name: 'Mind' },
  { id: 'prime',          name: 'Prime' },
  { id: 'spirit',         name: 'Spirit' },
  { id: 'time',           name: 'Time' },
];
const SPHERE_MAX = 5;

function totalLevel() { return SKILL_IDS.reduce((sum, id) => sum + S.skills[id].lv, 0); }

// Cost of the next level: first costs 5, then 5 × current level (5, 5, 10, 15, 20).
function sphereCost(lv) { return lv === 0 ? 5 : 5 * lv; }

function expSpent() {
  let spent = 0;
  for (const sp of SPHERES) {
    for (let l = 0; l < S.spheres[sp.id]; l++) spent += sphereCost(l);
  }
  return spent;
}
function expAvail() { return totalLevel() - expSpent(); }

function buySphere(id) {
  const lv = S.spheres[id];
  if (lv >= SPHERE_MAX) return;
  if (expAvail() < sphereCost(lv)) return;
  S.spheres[id]++;
  flashSaveStatus(SPHERES.find(sp => sp.id === id).name + ' ' + S.spheres[id]);
  renderSidebar();
  renderActivities();
}

// ─────────────────────────────────────────────
// CRAFT
// ─────────────────────────────────────────────
// The mage channels Quintessence into talismans that grant temporary
// boons. Recipes unlock in groups ("tiers") as the Prime sphere deepens.
// Each item's effect lasts either for a number of matching activity
// completions ('charges') or for a span of game-time ('time', amount in
// seconds). Active items are listed in the Craft menu so the player can
// always see what is currently in effect.
//
// effect types (they combine multiplicatively across active items):
//   reward  → ×payoff of the produced resource      (mag > 1)
//   speed   → ×activity speed, i.e. shorter durations (mag > 1)
//   xp      → ×XP gained                             (mag > 1)
//   setback → ×setback chance on risky activities    (mag < 1, a reduction)
//   cost    → ×resource cost of consumption skills   (mag < 1, a reduction)
// scope is 'all', or a list of skill ids the effect applies to.
const CRAFT_ITEMS = [
  // ── Tier 1 · Prime 1 — Lesser Charms (focused, charge-based) ──
  { id:'scholars_lens', tier:1, name:"Scholar's Lens",
    effect:'reward', mag:1.5, scope:['study','investigate'],
    mode:'charges', amount:10, cost:30,
    desc:'Next 10 Study or Investigate activities yield +50% reward.' },
  { id:'warriors_brand', tier:1, name:"Warrior's Brand",
    effect:'reward', mag:1.5, scope:['prepare','fight'],
    mode:'charges', amount:10, cost:30,
    desc:'Next 10 Prepare or Fight activities yield +50% reward.' },
  { id:'merchants_seal', tier:1, name:"Merchant's Seal",
    effect:'reward', mag:1.5, scope:['venture','barter'],
    mode:'charges', amount:10, cost:30,
    desc:'Next 10 Venture or Barter activities yield +50% reward.' },

  // ── Tier 2 · Prime 2 — Warded Talismans (broad, time-based) ──
  { id:'hourglass_focus', tier:2, name:'Hourglass of Focus',
    effect:'speed', mag:1.5, scope:'all',
    mode:'time', amount:3600, cost:80,
    desc:'For the next 1 hour, all activities are 50% faster.' },
  { id:'charm_insight', tier:2, name:'Charm of Insight',
    effect:'xp', mag:2, scope:'all',
    mode:'time', amount:3600, cost:80,
    desc:'For the next 1 hour, all activities grant double XP.' },
  { id:'ward_safety', tier:2, name:'Ward of Safety',
    effect:'setback', mag:0.4, scope:'all',
    mode:'time', amount:7200, cost:70,
    desc:'For the next 2 hours, risky activities are 60% less likely to backfire.' },

  // ── Tier 3 · Prime 3 — Greater Relics (potent, mixed) ──
  { id:'philosophers_stone', tier:3, name:"Philosopher's Stone",
    effect:'reward', mag:2, scope:'all',
    mode:'charges', amount:15, cost:200,
    desc:'Next 15 activities of any kind yield double resources.' },
  { id:'sigil_mastery', tier:3, name:'Sigil of Mastery',
    effect:'speed', mag:2, scope:'all',
    mode:'charges', amount:12, cost:220,
    desc:'Next 12 activities of any kind are twice as fast.' },
  { id:'talisman_frugality', tier:3, name:'Talisman of Frugality',
    effect:'cost', mag:0.5, scope:['fight','barter'],
    mode:'time', amount:7200, cost:150,
    desc:'For the next 2 hours, Fight and Barter cost half as much.' },
];
const CRAFT_BY_ID = Object.fromEntries(CRAFT_ITEMS.map(it => [it.id, it]));
const CRAFT_MAX_TIER = Math.max(...CRAFT_ITEMS.map(it => it.tier));

// Highest craftable tier — one tier per level of the Prime sphere.
function craftTierUnlocked() { return S.spheres.prime; }

// Combined multiplier from every active item matching (skillId, effect).
function craftFactor(skillId, effect) {
  let f = 1;
  for (const a of S.craftActive) {
    const def = CRAFT_BY_ID[a.id];
    if (!def || def.effect !== effect) continue;
    if (def.scope !== 'all' && !def.scope.includes(skillId)) continue;
    f *= def.mag;
  }
  return f;
}

function actCost(skillId, act) {
  return act.cost * craftFactor(skillId, 'cost');
}

// Spend one charge from each charge-based item that applies to skillId,
// dropping any item whose charges run out.
function consumeCraftCharges(skillId) {
  for (let i = S.craftActive.length - 1; i >= 0; i--) {
    const a   = S.craftActive[i];
    const def = CRAFT_BY_ID[a.id];
    if (!def || def.mode !== 'charges') continue;
    if (def.scope !== 'all' && !def.scope.includes(skillId)) continue;
    if (--a.remaining <= 0) S.craftActive.splice(i, 1);
  }
}

// Tick down time-based items; returns true if any item expired this frame.
function updateCraftTimers(dt) {
  let removed = false;
  for (let i = S.craftActive.length - 1; i >= 0; i--) {
    const a   = S.craftActive[i];
    const def = CRAFT_BY_ID[a.id];
    if (!def || def.mode !== 'time') continue;
    a.remaining -= dt;
    if (a.remaining <= 0) { S.craftActive.splice(i, 1); removed = true; }
  }
  return removed;
}

function hasActiveCraftTimer() {
  return S.craftActive.some(a => { const d = CRAFT_BY_ID[a.id]; return d && d.mode === 'time'; });
}

function craftItem(id) {
  const def = CRAFT_BY_ID[id];
  if (!def) return;
  if (craftTierUnlocked() < def.tier) return;
  if (S.res.quintessence < def.cost) return;

  S.res.quintessence -= def.cost;
  const existing = S.craftActive.find(a => a.id === id);
  if (existing) existing.remaining = def.amount;   // recrafting refreshes it
  else S.craftActive.push({ id, remaining: def.amount });

  flashSaveStatus('Crafted: ' + def.name);
  renderResources();
  renderSidebar();
  renderActivities();
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function xpForLevel(lv) {
  // cumulative XP needed to reach `lv`
  let total = 0;
  for (let i = 1; i <= lv; i++) total += Math.floor(35 * Math.pow(1.2, i - 1));
  return total;
}
function xpToNext(lv) { return Math.floor(35 * Math.pow(1.2, lv)); }
function speed(lv)    { return 1 + lv * 0.05; }
// A crafted 'speed' boon shortens durations for the matching skill.
function effDur(baseDur, lv, skillId) {
  const cs = skillId ? craftFactor(skillId, 'speed') : 1;
  return baseDur / (speed(lv) * cs);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Risky activities pay a premium: +20% at risk 1.0, scaling with risk.
function actReward(sk, act) {
  return sk.risky ? act.reward * (1 + 0.2 * act.risk) : act.reward;
}
// Setback chance %: (40 × risk − skillLevel), reduced as the skill levels up.
function setbackChance(sk, act, lv) {
  return sk.risky ? clamp(40 * act.risk - lv, 0, 95) : 0;
}
// Recovery time: base 3×risk seconds, scaled by activity length (es baseline).
function setbackDur(act) {
  return 3 * act.risk * (act.dur / 5);
}

function fmt(n) {
  if (n < 1000)  return (Math.round(n * 10) / 10).toFixed(1);
  if (n < 1e6)   return (n / 1e3).toFixed(1) + 'k';
  if (n < 1e9)   return (n / 1e6).toFixed(2) + 'M';
  return (n / 1e9).toFixed(2) + 'B';
}
function fmtTime(s) {
  if (s >= 3600) return (s / 3600).toFixed(1) + 'h';
  if (s >= 60)   return (s / 60).toFixed(1) + 'm';
  return s.toFixed(1) + 's';
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const S = {
  res:   { knowledge: 0, money: 0, power: 0, quintessence: 0, renown: 0 },
  total: { knowledge: 0, money: 0, power: 0, quintessence: 0, renown: 0 }, // lifetime acquired
  skills: {
    study:       { lv: 0, xp: 0 },
    prepare:     { lv: 0, xp: 0 },
    venture:     { lv: 0, xp: 0 },
    network:     { lv: 0, xp: 0 },
    steal:       { lv: 0, xp: 0 },
    investigate: { lv: 0, xp: 0 },
    explore:     { lv: 0, xp: 0 },
    fight:       { lv: 0, xp: 0 },
    barter:      { lv: 0, xp: 0 },
  },
  unlocked: { fight: false, barter: false, spheres: false, craft: false },
  upgrades: {},   // purchased upgrade ids → true
  spheres: Object.fromEntries(SPHERES.map(sp => [sp.id, 0])),
  craftActive: [], // active crafted boons → [{ id, remaining }] (remaining = charges or seconds)
  tab:     'study',
  running: null,   // { skillId, idx, progress, dur }
  setback: { on: false, remaining: 0, total: 0 },
};

// Transient notice for the bottom bar (e.g. ran out of Power); not saved.
let haltMsg = '';

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
let last = performance.now();

function tick(now) {
  const dt = (now - last) / 1000; //speed // default: 1000
  last = now;

  // Crafted time-based boons count down in real time, even during a setback.
  const craftRemoved = updateCraftTimers(dt);
  if (craftRemoved) renderSidebar();
  if (S.tab === 'craft' && (craftRemoved || hasActiveCraftTimer())) renderActivities();

  if (S.setback.on) {
    S.setback.remaining = Math.max(0, S.setback.remaining - dt);
    if (S.setback.remaining <= 0) { S.setback.on = false; }
    renderBottomBar();
    requestAnimationFrame(tick);
    return;
  }

  if (S.running) {
    const { skillId, idx } = S.running;
    const sk   = SKILLS[skillId];
    const ss   = S.skills[skillId];
    const act  = sk.activities[idx];
    const dur  = effDur(act.dur, ss.lv, skillId);

    S.running.progress += dt;
    S.running.dur = dur;

    if (S.running.progress >= dur) {
      // Award resource — apply upgrade multiplier and any crafted boon
      gainRes(sk.resource, actReward(sk, act) * payoffMult(skillId) * craftFactor(skillId, 'reward'));

      // Award XP (proportional to base duration, boosted by any 'xp' boon);
      // each level-up grants 1 EXP implicitly and may trip an unlock.
      ss.xp += act.dur * craftFactor(skillId, 'xp');
      const lvBefore = ss.lv;
      while (ss.xp >= xpForLevel(ss.lv + 1)) ss.lv++;
      if (ss.lv !== lvBefore) checkUnlocks();

      // Risky activities may trigger a setback on completion ('setback' boons reduce the odds)
      const chance = setbackChance(sk, act, ss.lv) * craftFactor(skillId, 'setback');
      if (chance > 0 && Math.random() * 100 < chance) {
        const sbDur = setbackDur(act);
        S.setback = { on: true, remaining: sbDur, total: sbDur };
      }

      // Spend a charge from any charge-based boon that applied to this activity
      consumeCraftCharges(skillId);

      // Re-queue the activity; consumption skills must afford the next cycle
      if (tryPayCost(skillId, sk, act)) {
        S.running = { skillId, idx, progress: 0, dur: effDur(act.dur, ss.lv, skillId) };
      } else {
        S.running = null;
        haltMsg = `Not enough ${sk.costRes} to continue "${act.name}".`;
      }

      renderResources();
      renderSidebar();
      if (S.tab === skillId || S.tab === 'unlocks' || S.tab === 'upgrades' || S.tab === 'spheres' || S.tab === 'craft') renderActivities();
    }

    renderBottomBar();
  }

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);

// ─────────────────────────────────────────────
// INTERACTION
// ─────────────────────────────────────────────
function selectTab(skillId) {
  S.tab = skillId;
  renderSidebar();
  renderActivities();
}

function startActivity(skillId, idx) {
  if (S.setback.on) return;
  const ss = S.skills[skillId];
  if (ss.lv < SKILLS[skillId].unlocks[idx]) return;

  const sk  = SKILLS[skillId];
  const act = sk.activities[idx];
  if (!tryPayCost(skillId, sk, act)) {
    S.running = null;
    haltMsg = `Not enough ${sk.costRes} to start "${act.name}".`;
    renderActivities();
    renderBottomBar();
    return;
  }
  haltMsg = '';
  S.running = { skillId, idx, progress: 0, dur: effDur(act.dur, ss.lv, skillId) };

  renderResources();
  renderActivities();
  renderBottomBar();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderResources() {
  for (const [k, v] of Object.entries(S.res)) {
    const el = document.getElementById('r-' + k);
    if (el) el.textContent = fmt(v);
  }
  const tl = document.getElementById('r-total-level');
  if (tl) tl.textContent = totalLevel();
}

function renderSidebar() {
  const unlockedCount = UNLOCKS.filter(u => S.unlocked[u.id]).length;
  document.getElementById('skill-sidebar').innerHTML =
    `<div class="sidebar-title">Skills</div>` +
    SKILL_IDS.filter(isSkillUnlocked).map(id => {
      const ss = S.skills[id];
      return `<div class="skill-tab${S.tab === id ? ' active' : ''}" onclick="selectTab('${id}')">
        ${SKILLS[id].name}
        <div class="skill-lv">Lv ${ss.lv}</div>
      </div>`;
    }).join('') +
    `<div class="sidebar-divider"></div>` +
    (S.unlocked.spheres ? `<div class="skill-tab${S.tab === 'spheres' ? ' active' : ''}" onclick="selectTab('spheres')">
      Spheres
      <div class="skill-lv">${expAvail()} EXP</div>
    </div>` : '') +
    (S.unlocked.craft ? `<div class="skill-tab${S.tab === 'craft' ? ' active' : ''}" onclick="selectTab('craft')">
      Craft
      <div class="skill-lv">${S.craftActive.length} active</div>
    </div>` : '') +
    `<div class="skill-tab${S.tab === 'upgrades' ? ' active' : ''}" onclick="selectTab('upgrades')">

      <div class="skill-lv">${Object.keys(S.upgrades).length} / ${UPGRADES.length}</div>

      <div class="skill-lv">${unlockedCount} / ${UNLOCKS.length}</div>

}

function renderUpgrades() {
  const owned = Object.keys(S.upgrades).length;

    <div class="panel-header">
      <h2>Upgrades</h2>
      <span class="xp-label">${owned} / ${UPGRADES.length} purchased</span>

    for (const u of UPGRADES.filter(x => x.skillId === skillId)) {

function renderUnlocks() {

function renderSpheres() {
  let html = `

function renderCraft() {
  const tierUnlocked = craftTierUnlocked();
  let html = `
    <div class="panel-header">
      <h2>Craft — Quintessence Talismans</h2>
      <span class="xp-label">${fmt(S.res.quintessence)} Quintessence</span>
    </div>
    <div class="unlock-desc" style="margin-bottom:14px">
      Spend Quintessence to forge talismans that grant temporary boons.
      Recipes unlock in groups as you advance the <strong>Prime</strong> sphere.
    </div>
  `;

  // ── Active boons (so the player always sees what is in effect) ──
  html += `<div class="upgrade-group">Active Boons</div>`;
  if (S.craftActive.length === 0) {
    html += `<div class="unlock-desc" style="margin-bottom:8px">No talismans are currently active.</div>`;
  } else {
    for (const a of S.craftActive) {
      const def = CRAFT_BY_ID[a.id];

      const remain = def.mode === 'charges'

    for (const def of items) {
      const active = S.craftActive.some(a => a.id === def.id);
      const canBuy = !tierLocked && S.res.quintessence >= def.cost;

      const state = tierLocked
        ? `Requires Prime ${t}`
        : `<button class="buy-btn" onclick="craftItem('${def.id}')"${canBuy ? '' : ' disabled'}>
             ${active ? 'Recraft' : 'Craft'} — ${fmt(def.cost)} Quint</button>`;

      html += `
        <div class="unlock-item${tierLocked ? ' dimmed' : ''}${active ? ' done' : ''}">
          <div>
            <div class="unlock-name">${def.name}</div>
            <div class="unlock-desc">${def.desc}</div>
          </div>
          <div class="unlock-state">${state}</div>
        </div>`;
    }
  }

  document.getElementById('activity-panel').innerHTML = html;
}

function renderActivities() {
  if (S.tab === 'unlocks')  { renderUnlocks();  return; }
  if (S.tab === 'upgrades') { renderUpgrades(); return; }
  if (S.tab === 'spheres')  { renderSpheres();  return; }
  if (S.tab === 'craft')    { renderCraft();    return; }

  const id = S.tab;
  const sk = SKILLS[id];
  const ss = S.skills[id];

  const cumXp  = ss.xp - xpForLevel(ss.lv);
  const needed = xpToNext(ss.lv);
  const pct    = Math.min(100, (cumXp / needed) * 100);

  let html = `
    <div class="panel-header">
      <h2>${sk.name} — Level ${ss.lv}</h2>
      <span class="xp-label">${Math.floor(cumXp)} / ${needed} XP</span>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar" style="width:${pct}%"></div></div>
  `;

  sk.activities.forEach((act, i) => {
    const unlockLv = sk.unlocks[i];
    const locked   = ss.lv < unlockLv;
    const running  = S.running && S.running.skillId === id && S.running.idx === i;
    const dur      = effDur(act.dur, ss.lv, id);

    html += `
      <div class="activity-item${locked ? ' locked' : ''}${running ? ' running' : ''}"
           onclick="startActivity('${id}', ${i})">
        <div>
          <div class="activity-name">${act.name}</div>
          ${locked ? `<div class="activity-unlock-note">Requires level ${unlockLv}</div>` : ''}
        </div>
        <div class="activity-meta">
          ${sk.costRes && !locked ? `<div class="activity-cost">−${fmt(actCost(id, act))} ${sk.costRes}</div>` : ''}
          <div class="activity-reward">+${fmt(actReward(sk, act) * payoffMult(id) * craftFactor(id, 'reward'))} ${sk.resource}</div>
          <div>${fmtTime(dur)}</div>
          ${sk.risky && !locked ? `<div class="activity-risk">⚠ ${Math.round(setbackChance(sk, act, ss.lv) * craftFactor(id, 'setback'))}% · ${fmtTime(setbackDur(act))} recovery</div>` : ''}
        </div>
      </div>`;
  });

  document.getElementById('activity-panel').innerHTML = html;
}

function renderBottomBar() {
  const bar = document.getElementById('bottom-bar');

  if (S.setback.on) {
    const pct = (1 - S.setback.remaining / S.setback.total) * 100;
    bar.className = 'bottom-bar setback-mode';
    bar.innerHTML = `
      <div class="bar-sublabel danger">Recovering — the mage suffers the consequences</div>
      <div class="bar-name">Setback<span class="bar-timer">${fmtTime(S.setback.remaining)} remaining</span></div>
      <div class="prog-wrap"><div class="prog-fill setback-fill" style="width:${pct}%"></div></div>`;
    return;
  }

  if (!S.running) {
    bar.className = 'bottom-bar';
    bar.innerHTML = `<span class="idle-msg">${haltMsg || 'Select an activity to begin.'}</span>`;
    return;
  }

  const { skillId, idx, progress, dur } = S.running;
  const act  = SKILLS[skillId].activities[idx];
  const pct  = Math.min(100, (progress / dur) * 100);
  const rem  = Math.max(0, dur - progress);

  bar.className = 'bottom-bar';
  bar.innerHTML = `
    <div class="bar-sublabel">Currently performing</div>
    <div class="bar-name">${act.name}<span class="bar-timer">${fmtTime(rem)}</span></div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>`;
}

// ─────────────────────────────────────────────
// SAVE / LOAD
// ─────────────────────────────────────────────
const SAVE_KEY = 'mage-idle-save';
const SAVE_VERSION = 1;
const AUTOSAVE_INTERVAL = 15000;

function serializeSave() {
  return JSON.stringify({
    v: SAVE_VERSION,
    savedAt: Date.now(),
    res: S.res,
    total: S.total,
    skills: S.skills,
    unlocked: S.unlocked,
    upgrades: S.upgrades,
    spheres: S.spheres,
    craftActive: S.craftActive,
    tab: S.tab,
    running: S.running,
    setback: S.setback,
  });
}

function saveGame(manual) {
  try {
    localStorage.setItem(SAVE_KEY, serializeSave());
    flashSaveStatus(manual ? 'Saved' : 'Autosaved');
  } catch (e) {
    flashSaveStatus('Save failed');
  }
}

// Merge a parsed save into S, validating every field so old or
// hand-edited saves (and future schema changes) can't break the game.
function applySave(d) {
  if (!d || typeof d !== 'object') return;

  if (d.res) {
    for (const k of Object.keys(S.res)) {
      if (typeof d.res[k] === 'number' && isFinite(d.res[k])) S.res[k] = d.res[k];
    }
  }
  for (const k of Object.keys(S.total)) {
    if (d.total && typeof d.total[k] === 'number' && isFinite(d.total[k])) {
      S.total[k] = d.total[k];
    } else {
      // Older saves had no lifetime totals; the current balance is the
      // best lower bound for what was acquired.
      S.total[k] = S.res[k];
    }
  }
  if (d.unlocked) {
    for (const k of Object.keys(S.unlocked)) S.unlocked[k] = !!d.unlocked[k];
  }
  S.upgrades = {};
  if (d.upgrades) {
    for (const u of UPGRADES) if (d.upgrades[u.id]) S.upgrades[u.id] = true;
  }
  S.spheres = Object.fromEntries(SPHERES.map(sp => [sp.id, 0]));
  if (d.spheres) {
    for (const sp of SPHERES) {
      const v = d.spheres[sp.id];
      if (typeof v === 'number' && isFinite(v)) {
        S.spheres[sp.id] = clamp(Math.floor(v), 0, SPHERE_MAX);
      }
    }
  }
  S.craftActive = [];
  if (Array.isArray(d.craftActive)) {
    for (const a of d.craftActive) {
      const def = a && CRAFT_BY_ID[a.id];
      if (def && typeof a.remaining === 'number' && isFinite(a.remaining) && a.remaining > 0) {
        S.craftActive.push({ id: a.id, remaining: clamp(a.remaining, 0, def.amount) });
      }
    }
  }
  if (d.skills) {
    for (const id of SKILL_IDS) {
      const sv = d.skills[id];
      if (!sv) continue;
      if (typeof sv.lv === 'number' && isFinite(sv.lv)) S.skills[id].lv = Math.max(0, Math.floor(sv.lv));
      if (typeof sv.xp === 'number' && isFinite(sv.xp)) S.skills[id].xp = Math.max(0, sv.xp);
    }
  }
  if (d.tab === 'unlocks' || d.tab === 'upgrades' ||
      (d.tab === 'spheres' && S.unlocked.spheres) ||
      (d.tab === 'craft' && S.unlocked.craft) ||
      (SKILL_IDS.includes(d.tab) && isSkillUnlocked(d.tab))) S.tab = d.tab;

  S.running = null;
  if (d.running && SKILLS[d.running.skillId] &&
      SKILLS[d.running.skillId].activities[d.running.idx]) {
    const { skillId, idx } = d.running;
    const dur = effDur(SKILLS[skillId].activities[idx].dur, S.skills[skillId].lv, skillId);
    S.running = {
      skillId, idx, dur,
      progress: clamp(typeof d.running.progress === 'number' ? d.running.progress : 0, 0, dur),
    };
  }

  S.setback = { on: false, remaining: 0, total: 0 };
  if (d.setback && d.setback.on &&
      typeof d.setback.remaining === 'number' && d.setback.remaining > 0) {
    const total = typeof d.setback.total === 'number' && d.setback.total > 0
      ? d.setback.total : d.setback.remaining;
    S.setback = { on: true, remaining: Math.min(d.setback.remaining, total), total };
  }
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    applySave(JSON.parse(raw));
    return true;
  } catch (e) {
    console.warn('Could not load save:', e);
    return false;
  }
}

function exportSave() {
  prompt('Copy this save code (Ctrl+C):', btoa(serializeSave()));
}

function importSave() {
  const code = prompt('Paste your save code:');
  if (!code) return;
  try {
    applySave(JSON.parse(atob(code.trim())));
    saveGame();
    renderAll();
    flashSaveStatus('Imported');
  } catch (e) {
    alert('That save code is invalid.');
  }
}

function resetSave() {
  if (!confirm('Erase all progress and start over? This cannot be undone.')) return;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

let saveStatusTimer = null;
function flashSaveStatus(msg) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(saveStatusTimer);
  saveStatusTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

setInterval(() => saveGame(false), AUTOSAVE_INTERVAL);
window.addEventListener('beforeunload', () => {
  try { localStorage.setItem(SAVE_KEY, serializeSave()); } catch (e) {}
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function renderAll() {
  renderResources();
  renderSidebar();
  renderActivities();
  renderBottomBar();
}

loadGame();
checkUnlocks();
renderAll();
</script>
</body>
</html>
